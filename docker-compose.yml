services:
  bot:
    build:
      context: .
      target: prod
    env_file: .env
    environment:
      QDRANT_URL: http://qdrant:6333
      DATA_DIR: /app/data
      MODEL_CACHE_DIR: /app/model-cache
      SSH_KEYS_LOCAL: /app/ssh-keys-local
      SSH_KEYS_SHARED: /app/ssh-keys-shared
    volumes:
      - bot-data:/app/data
      - model-cache:/app/model-cache
      - ./config:/app/config:ro
      - ssh-keys-local:/app/ssh-keys-local
      - ssh-keys-shared:/app/ssh-keys-shared
    networks:
      - default
      - bash-net
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /app/ssh-keys-shared/authorized_keys"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 30s
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  bash-vm:
    build:
      context: ./docker/bash-vm
    read_only: true
    volumes:
      - ssh-keys-shared:/ssh-keys-vol:ro
    tmpfs:
      - /tmp:size=512M,mode=1777
      - /home/user:size=512M,mode=755,uid=1000,gid=1000
      - /run:size=8M,mode=755
    networks:
      - default
      - bash-net
    cap_add:
      - NET_ADMIN
    # Resource limits to prevent fork bombs and resource exhaustion
    pids_limit: 64
    mem_limit: 512m
    memswap_limit: 512m
    cpus: 1.0
    ulimits:
      nproc: 64
      nofile:
        soft: 1024
        hard: 4096
    depends_on:
      bot:
        condition: service_healthy
    restart: unless-stopped

networks:
  bash-net:
    internal: true

volumes:
  bot-data:
  model-cache:
  qdrant-data:
  ssh-keys-local:
  ssh-keys-shared:
