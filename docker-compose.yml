services:
  bot:
    build:
      context: .
      target: prod
    environment:
      PROFILE: ${PROFILE:?PROFILE is required}
      DISCORD_TOKEN: ${DISCORD_TOKEN:?DISCORD_TOKEN is required}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      CODEX_AUTH_PATH: ${CODEX_AUTH_PATH:-/app/data/codex-auth.json}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:-}
      DASHBOARD_PASSWORDLESS_CIDRS: ${DASHBOARD_PASSWORDLESS_CIDRS:-}
      DASHBOARD_TRUSTED_PROXY_CIDRS: ${DASHBOARD_TRUSTED_PROXY_CIDRS:-}
      VPN_API_URL: ${VPN_API_URL:-}
      VPN_PEER: ${VPN_PEER:-}
    volumes:
      - bot-data:/app/data
      - ./profiles:/app/profiles:ro
    ports:
      - "127.0.0.1:${DASHBOARD_PORT:-31456}:3000"
    # Replies and image delivery remain live during coordinated shutdown.
    stop_grace_period: 30m
    restart: unless-stopped

volumes:
  bot-data:
