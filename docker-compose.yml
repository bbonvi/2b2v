services:
  bot:
    build:
      context: .
      target: prod
    env_file: .env
    environment:
      QDRANT_URL: http://qdrant:6333
      DATA_DIR: /app/data
      MODEL_CACHE_DIR: /app/model-cache
    volumes:
      - bot-data:/app/data
      - model-cache:/app/model-cache
      - ./config:/app/config:ro
      - ssh-keys:/app/ssh-keys
    networks:
      - default
      - bash-net
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  bash-vm:
    build:
      context: ./docker/bash-vm
    volumes:
      - ssh-keys:/ssh-keys:ro
    networks:
      - bash-net
    cap_add:
      - NET_ADMIN
    restart: unless-stopped

networks:
  bash-net:
    internal: true

volumes:
  bot-data:
  model-cache:
  qdrant-data:
  ssh-keys:
