services:
  bot:
    build:
      context: .
      target: prod
    env_file: .env
    environment:
      QDRANT_URL: http://qdrant:6333
      DATA_DIR: /app/data
      MODEL_CACHE_DIR: /app/model-cache
    volumes:
      - bot-data:/app/data
      - model-cache:/app/model-cache
      - ./config:/app/config:ro
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:6333/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  bot-data:
  model-cache:
  qdrant-data:
