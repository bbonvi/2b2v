services:
  bot:
    build:
      context: .
      target: prod
    env_file: .env.prod
    environment:
      QDRANT_URL: http://qdrant:6333
      DATA_DIR: /app/data
      MODEL_CACHE_DIR: /app/model-cache
    volumes:
      - bot-data:/app/data
      - model-cache:/app/model-cache
      - ./config:/app/config:ro
      # - ./prompts:/app/prompts:ro
      - ./prompts-prod:/app/prompts:ro
    ports:
      - "127.0.0.1:${DASHBOARD_PORT:-31456}:3000"
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  bot-data:
  model-cache:
  qdrant-data:
