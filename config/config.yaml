# Main bot configuration — config/config.yaml
# All fields are optional. Missing values use hardcoded defaults.

# LLM model (OpenRouter model ID)
# model: "qwen/qwen3.7-max"
model: "deepseek/deepseek-v4-pro:price"
# model: "google/gemini-3.5-flash"
# model: "deepseek/deepseek-v3.2"
# model: "anthropic/claude-haiku-4.5"
# model: "minimax/minimax-m2-her"
modelParams:
    safetySettings:
        [
            {
                "category": "HARM_CATEGORY_HARASSMENT",
                "threshold": "BLOCK_NONE",
            },
            {
                "category": "HARM_CATEGORY_HATE_SPEECH",
                "threshold": "BLOCK_NONE",
            },
            {
                "category": "HARM_CATEGORY_SEXUALLY_EXPLICIT",
                "threshold": "BLOCK_NONE",
            },
            {
                "category": "HARM_CATEGORY_DANGEROUS_CONTENT",
                "threshold": "BLOCK_NONE",
            },
        ]
    route:
        {
            "google":
                {
                    "safetySettings":
                        [
                            {
                                "category": "HARM_CATEGORY_HARASSMENT",
                                "threshold": "BLOCK_NONE",
                            },
                            {
                                "category": "HARM_CATEGORY_HATE_SPEECH",
                                "threshold": "BLOCK_NONE",
                            },
                            {
                                "category": "HARM_CATEGORY_SEXUALLY_EXPLICIT",
                                "threshold": "BLOCK_NONE",
                            },
                            {
                                "category": "HARM_CATEGORY_DANGEROUS_CONTENT",
                                "threshold": "BLOCK_NONE",
                            },
                        ],
                },
        }

# OpenRouter prompt caching control.
# When enabled, stable prompt sections are marked with cache_control breakpoints.
# OpenRouter/provider routing decides whether the selected provider uses them.
promptCaching:
    enabled: true

replyLoop:
    maxToolCalls: 16 # Max tool calls allowed in one response run
    wallClockTimeoutMs: 240000 # Hard timeout per response run (milliseconds)
    llmOutputTimeoutMs: 60000 # Timeout for one LLM turn (milliseconds)

# Thinking/reasoning level for the model
thinkingLevel: "high"

# Default timezone for guilds that don't override
timezone: Europe/Moscow

# Trigger-specific instructions injected when bot responds to each trigger type.
# Provides behavioral context for how the bot should behave in each scenario.
triggerInstructions:
    # mention: "User directly mentioned you. Respond to that user specifically."
    keyword: "Your response is triggered by a keyword match, not a direct reply or mention. It might be erroneous. You may answer briefly or stay silent by producing no useful reply only when silence is clearly better."
    random: "You're sending a message unprompted and to no specific user. Make a brief remark about the chat without hijacking conversation."
    scheduled: "This is a scheduled task. Follow the task instructions closely. Treat the message as an instruction, not as literal text to send. Write an entirely new message instead. Consider context and chat history. If addressing a user, you should probably ping them via @<username>."

# Context window trimming thresholds
trim:
    trimTrigger: 500 # Start trimming when history exceeds this many messages
    trimTarget: 300 # Trim down to this many messages
    windowSize: 100 # Recent messages kept uncached (newer slice)
    messageCharLimit: 200 # Max chars per message before truncation
    replyQuoteChars: 50 # Max chars for reply quote excerpts

# Default trigger settings (guilds can override)
triggers:
    mention: true # Respond when @mentioned
    keywords:
        - "2b"
        - "тубишка"
        - "туби"
    randomChance: 0.001 # 0–1 probability of responding to any message
    keywordDebounceMs: 3000 # Wait this long after a keyword trigger before replying
    typingIdleMs: 10000 # Treat typingStart from the triggering user as active for this long
    typingMaxWaitMs: 40000 # Hard cap for typing-aware keyword waits

# Emote/emoji settings
emotes:
    include: false # Include available server emojis in LLM context (default: false)

members:
    include: false # Include server members list in context (default: true)

# ElevenLabs text-to-speech configuration (requires ELEVENLABS_API_KEY env var)
# When enabled, the bot can send voice messages as audio attachments
tts:
    enabled: true
    voices:
        normal:
            voiceId: WAhoMTNdLdMoq1j3wf3I # Your ElevenLabs voice ID
            # voiceId: g0QruJYStgk5oVbpq3Uv
            stability: 0.65
            applyTextNormalization: "on"
            outputFormat: mp3_44100_128
            speed: 1.15
            style: 0.0
            seed: 1
            similarityBoost: 0.70
            model: eleven_v3
        # whisper is obsolete and ignored. Use Eleven v3 tags like [whispers] inside <voice>...</voice>.
        # whisper:
        #     voiceId: WAhoMTNdLdMoq1j3wf3I
        #     # speed: 1.05
        #     # stability: 0.5
        #     # similarityBoost: 0.4
        #     model: eleven_v3

# Max image dimension (larger images resized to fit)
imageMaxDimension: 768

# Max seconds between messages to merge consecutive same-author messages
mergeMessageGapSeconds: 90

# Max images the LLM can read in a single read_chat_images call
imageReadMaxPerCall: 10

# If the main model cannot read image input, describe images with this vision model
# and return that description from image tools instead.
imageReading:
    fallbackEnabled: true
    fallbackModel: "moonshotai/kimi-k2.6"

# Enable automatic image captioning (requires captioning model)
imageCaptioningEnabled: false

# Composable prompt profile for stable instruction sections.
# Sources are resolved in order and concatenated with blank lines.
promptProfile:
    persona:
        - file: prompts/persona.md
    toolInstructions: []
    instructions: []
    lateInstructions:
        - file: prompts/style.md

# Log level: debug | info | warn | error
logLevel: debug

# Directory for SQLite database and attachments
dataDir: data

# Directory for caching embedding model files
modelCacheDir: model-cache

# Qdrant vector database URL (env var QDRANT_URL takes priority)
qdrantUrl: http://localhost:6333

uiLang: ru
# VPN configuration (WireGuard profile management)
# Set enabled: true to enable /vpn command
vpn:
    enabled: true
    apiUrl: "https://2b.lmao13.co"
    vpnPeer: "195.2.71.75"

# Bash tool configuration (remote shell execution via SSH)
# Requires docker-compose bash-vm service when enabled.
# Guild configs can only toggle enabled; all other settings are global-only.
bashTool:
    enabled: true
    ssh:
        host: bash-vm
        port: 22
        user: user
    timeoutMs: 5000 # Max command runtime (capped at 5000)
    outputLimit: 10000 # Max chars returned after IP redaction
    blocklist: # Regex patterns for blocked commands (case-insensitive)
        - "\\b(shutdown|reboot|poweroff|halt|init\\s+[06])\\b"
        - "\\b(iptables|ip6tables|nft|nftables|ufw|firewall-cmd|firewalld)\\b"
        - "\\b(ifconfig|ip\\s+(link|addr|route)|route\\s+(add|del)|ss|netstat)\\b"
        - "\\b(sysctl|systemctl|service)\\b"
        - "\\b(docker|podman|kubectl|nsenter|chroot)\\b"
        - "\\b(modprobe|insmod|rmmod|lsmod)\\b"
        - "\\b(mount|umount|mkfs|fdisk|parted)\\b"
        - "\\b(killall\\s+sshd|pkill\\s+sshd)\\b"
