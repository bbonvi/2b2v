<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Request Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

  :root {
    --bg: #08090a;
    --surface: #0f1012;
    --surface-2: #161819;
    --border: #1e2123;
    --border-active: #2a2d31;
    --text: #c4c9cf;
    --text-dim: #6b7280;
    --text-bright: #e8ecf0;
    --accent: #3d8bfd;
    --accent-dim: #1a3a6b;
    --green: #22c55e;
    --green-dim: #0a2f1a;
    --red: #ef4444;
    --red-dim: #3b1111;
    --amber: #f59e0b;
    --amber-dim: #3b2a06;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--mono);
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* Top bar */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 1.25rem;
    display: flex; align-items: center; gap: 1rem;
    height: 48px;
  }
  .topbar-title {
    font-size: .7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .18em;
    color: var(--text-dim);
    white-space: nowrap;
    font-family: var(--sans);
  }
  .topbar-sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0 }

  .status-badge {
    display: none;
    align-items: center; gap: .4rem;
    font-size: .7rem;
    color: var(--amber);
    font-weight: 500;
  }
  .status-badge.active { display: flex }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--amber);
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1 }
    50% { opacity: .3 }
  }

  .filters {
    display: flex; gap: .5rem; margin-left: auto; align-items: center;
  }
  select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: .7rem;
    padding: .35rem .5rem;
    outline: none;
    cursor: pointer;
    min-width: 100px;
    max-width: 180px;
  }
  select:focus { border-color: var(--accent) }

  .btn {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: .7rem;
    padding: .35rem .7rem;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: .08em;
  }
  .btn:hover { border-color: var(--accent); color: var(--text-bright) }
  .btn.danger { color: var(--red); border-color: var(--red-dim); }
  .btn.danger:hover { border-color: var(--red); color: #ffb4b4; }
  .btn.primary { color: var(--text-bright); border-color: var(--accent-dim); }
  .btn:disabled {
    opacity: .35;
    cursor: not-allowed;
    border-color: var(--border);
    color: var(--text-dim);
  }
  .tabs { display: flex; gap: .35rem; align-items: center; }
  .tab-btn {
    background: transparent;
    border: 1px solid transparent;
    color: var(--text-dim);
    font-family: var(--sans);
    font-size: .68rem;
    font-weight: 600;
    letter-spacing: .12em;
    text-transform: uppercase;
    padding: .32rem .55rem;
    cursor: pointer;
  }
  .tab-btn.active {
    color: var(--text-bright);
    border-color: var(--border-active);
    background: var(--bg);
  }

  /* Content */
  .content { padding: 1rem 1.25rem; }
  .content[hidden] { display: none; }

  .log-count {
    font-size: .65rem;
    color: var(--text-dim);
    margin-bottom: .75rem;
    text-transform: uppercase;
    letter-spacing: .1em;
  }

  /* Log entries */
  .entry {
    background: var(--surface);
    border: 1px solid var(--border);
    margin-bottom: 2px;
    transition: border-color .1s;
  }
  .entry:hover { border-color: var(--border-active) }
  .entry.has-error { border-left: 2px solid var(--red) }
  .entry.no-agent { opacity: .5 }

  .entry-header {
    display: flex;
    align-items: center;
    gap: .75rem;
    padding: .5rem .75rem;
    font-size: .72rem;
    cursor: pointer;
  }
  .entry-context {
    color: var(--text);
    font-size: .68rem;
    padding: 0 .75rem .55rem 10.4rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .entry-context .context-author { color: var(--text-dim) }
  .entry-time {
    color: var(--text-dim);
    font-size: .65rem;
    min-width: 65px;
  }
  .entry-user {
    color: var(--accent);
    font-weight: 500;
    min-width: 80px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .entry-trigger {
    color: var(--text-dim);
    font-size: .65rem;
    background: var(--surface-2);
    padding: .1rem .4rem;
    border-radius: 2px;
  }
  .entry-stats {
    display: flex; gap: .75rem;
    margin-left: auto;
    font-size: .65rem;
    color: var(--text-dim);
  }
  .entry-stats span { white-space: nowrap }
  .stat-val { color: var(--text) }
  .entry-error-badge {
    background: var(--red-dim);
    color: var(--red);
    font-size: .6rem;
    font-weight: 600;
    padding: .1rem .35rem;
    text-transform: uppercase;
    letter-spacing: .05em;
  }
  .entry-cost {
    color: var(--green);
  }

  /* Expanded detail */
  .entry-detail {
    display: none;
    border-top: 1px solid var(--border);
    padding: .75rem;
  }
  .entry.expanded .entry-detail { display: block }

  .detail-section {
    margin-bottom: .75rem;
  }
  .detail-section:last-child { margin-bottom: 0 }
  .detail-label {
    font-size: .6rem;
    text-transform: uppercase;
    letter-spacing: .15em;
    color: var(--text-dim);
    margin-bottom: .35rem;
    font-family: var(--sans);
    font-weight: 600;
  }
  .model-request {
    border-top: 1px solid var(--border);
    padding: .65rem 0;
  }
  .model-request:first-child { border-top: none; padding-top: 0 }
  .model-head {
    display: grid;
    grid-template-columns: minmax(160px, 1fr) auto;
    gap: .5rem;
    align-items: start;
    margin-bottom: .45rem;
  }
  .model-title {
    color: var(--text-bright);
    font-size: .72rem;
    font-weight: 600;
  }
  .model-meta {
    color: var(--text-dim);
    font-size: .62rem;
    margin-top: .15rem;
  }
  .model-stats {
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-end;
    gap: .35rem .7rem;
    color: var(--text-dim);
    font-size: .62rem;
  }
  .status-running { color: var(--amber) }
  .status-completed { color: var(--green) }
  .status-error { color: var(--red) }
  .status-skipped { color: var(--text-dim) }
  .batch-label {
    color: var(--text-dim);
    font-size: .6rem;
    text-transform: uppercase;
    letter-spacing: .08em;
    margin: .5rem 0 .15rem;
  }
  .entry.active { border-left: 2px solid var(--amber) }
  .entry-status {
    color: var(--amber);
    font-size: .6rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .05em;
  }

  .detail-table {
    width: 100%;
    border-collapse: collapse;
    font-size: .68rem;
  }
  .detail-table th {
    text-align: left;
    font-weight: 500;
    color: var(--text-dim);
    padding: .25rem .5rem;
    border-bottom: 1px solid var(--border);
    font-size: .6rem;
    text-transform: uppercase;
    letter-spacing: .08em;
  }
  .detail-table td {
    padding: .25rem .5rem;
    border-bottom: 1px solid #0d0e10;
    vertical-align: top;
  }
  .detail-table tr:last-child td { border-bottom: none }
  .tool-error { color: var(--red) }
  .tool-args {
    color: var(--text-dim);
    font-size: .62rem;
    max-width: 400px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .tool-result {
    color: var(--text-dim);
    font-size: .62rem;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .error-text {
    color: var(--red);
    background: var(--red-dim);
    padding: .35rem .5rem;
    font-size: .7rem;
  }
  .trigger-context {
    color: var(--text);
    background: #0b0c0d;
    border-left: 2px solid var(--border-active);
    padding: .45rem .6rem;
    font-size: .68rem;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .detail-state {
    color: var(--text-dim);
    font-size: .7rem;
    padding: .35rem 0;
  }
  .detail-state.error { color: var(--red) }

  .empty-state {
    text-align: center;
    padding: 4rem 1rem;
    color: var(--text-dim);
    font-size: .75rem;
  }

  .btn-sm { font-size: .6rem; padding: .15rem .4rem; }

  .management-toolbar {
    display: grid;
    grid-template-columns: minmax(140px, 220px) minmax(160px, 260px) minmax(90px, 130px) auto;
    gap: .5rem;
    align-items: center;
    margin-bottom: .85rem;
  }
  .management-actions { display: flex; gap: .45rem; justify-content: flex-end; align-items: center; }
  .discord-delete-toggle {
    display: flex;
    align-items: center;
    gap: .35rem;
    border: 1px solid var(--border);
    background: var(--surface-2);
    color: var(--text-dim);
    font-size: .62rem;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    padding: .28rem .45rem;
  }
  .discord-delete-toggle input {
    width: 14px;
    height: 14px;
    accent-color: var(--red);
  }
  .discord-delete-toggle.active {
    border-color: var(--red);
    background: var(--red-dim);
    color: #ffb4b4;
  }
  .number-input {
    width: 54px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: .7rem;
    padding: .35rem .4rem;
    outline: none;
  }
  .number-input:focus, textarea:focus, input:focus { border-color: var(--accent); }
  .prompt-lab {
    display: none;
    grid-template-columns: minmax(150px, 220px) minmax(0, 1fr) auto;
    gap: .5rem;
    align-items: start;
    margin-bottom: .85rem;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: .65rem 0;
  }
  .prompt-lab.active { display: grid; }
  .prompt-lab textarea {
    width: 100%;
    min-height: 68px;
    resize: vertical;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-bright);
    font-family: var(--mono);
    font-size: .75rem;
    line-height: 1.45;
    padding: .55rem;
    outline: none;
  }
  .prompt-lab-run {
    display: grid;
    gap: .4rem;
    justify-items: end;
  }
  .prompt-lab-status {
    color: var(--text-dim);
    font-size: .62rem;
    text-align: right;
    border: 1px solid transparent;
    padding: .28rem .4rem;
    min-width: 74px;
  }
  .prompt-lab-status.running {
    color: var(--amber);
    border-color: var(--amber);
    background: var(--amber-dim);
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
  }
  .prompt-lab-status.error {
    color: var(--red);
    border-color: var(--red);
    background: var(--red-dim);
    font-weight: 700;
  }
  .prompt-lab-report {
    display: none;
    margin-bottom: 1rem;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: .65rem 0;
  }
  .prompt-lab-report.active { display: block; }
  .prompt-lab-summary {
    display: flex;
    flex-wrap: wrap;
    gap: .4rem .75rem;
    color: var(--text-dim);
    font-size: .63rem;
    margin-bottom: .55rem;
  }
  .draft-message {
    border-left: 3px solid var(--green);
    background: rgba(34,197,94,.055);
    padding: .45rem .55rem;
    margin-top: .35rem;
    white-space: pre-wrap;
    overflow-wrap: anywhere;
    font-size: .72rem;
  }
  .lab-live {
    margin-top: .75rem;
    border-top: 1px solid var(--border);
    padding-top: .6rem;
  }
  .lab-live-row {
    display: grid;
    grid-template-columns: 80px minmax(0, 1fr) auto;
    gap: .5rem;
    align-items: start;
    border-bottom: 1px solid var(--border);
    padding: .35rem 0;
    font-size: .65rem;
  }
  .lab-live-row:last-child { border-bottom: none; }
  .lab-live-kind {
    color: var(--text-dim);
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
  }
  .lab-live-title {
    color: var(--text-bright);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .lab-live-meta {
    color: var(--text-dim);
    font-size: .6rem;
    margin-top: .12rem;
  }
  .dry-run-row {
    color: var(--amber);
    font-size: .65rem;
    margin-top: .22rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .management-grid {
    display: grid;
    grid-template-columns: minmax(0, 1.25fr) minmax(320px, .75fr);
    gap: 1rem;
    align-items: start;
  }
  .management-section-title {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: .75rem;
    color: var(--text-dim);
    font-family: var(--sans);
    font-size: .64rem;
    font-weight: 600;
    letter-spacing: .14em;
    text-transform: uppercase;
    margin-bottom: .45rem;
  }
  .management-list {
    border-top: 1px solid var(--border);
  }
  .management-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: .65rem;
    padding: .55rem .55rem .55rem .7rem;
    border-bottom: 1px solid var(--border);
    border-left: 3px solid transparent;
  }
  .management-row:hover { background: rgba(255,255,255,.018); }
  .management-row.message-bot {
    border-left-color: var(--green);
    background: linear-gradient(90deg, rgba(34,197,94,.055), transparent 160px);
  }
  .management-row.message-user {
    border-left-color: var(--accent);
    background: linear-gradient(90deg, rgba(61,139,253,.05), transparent 160px);
  }
  .management-row.message-selectable {
    cursor: pointer;
  }
  .management-row.message-selected {
    outline: 1px solid var(--accent);
    outline-offset: -1px;
    background:
      linear-gradient(90deg, rgba(61,139,253,.13), rgba(61,139,253,.035) 220px, transparent),
      var(--surface);
  }
  .management-row.message-bot.message-selected {
    outline-color: var(--green);
    background:
      linear-gradient(90deg, rgba(34,197,94,.15), rgba(34,197,94,.035) 220px, transparent),
      var(--surface);
  }
  .selected-marker {
    color: var(--accent);
    font-size: .58rem;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
  }
  .management-row.message-bot .selected-marker {
    color: var(--green);
  }
  .management-meta {
    display: flex;
    flex-wrap: wrap;
    gap: .35rem .65rem;
    color: var(--text-dim);
    font-size: .62rem;
    margin-bottom: .22rem;
  }
  .management-author { color: var(--accent); }
  .management-row.message-bot .management-author { color: var(--green); }
  .author-type {
    font-size: .58rem;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
  }
  .author-type.bot { color: var(--green); }
  .author-type.user { color: var(--accent); }
  .management-content {
    color: var(--text);
    white-space: pre-wrap;
    overflow-wrap: anywhere;
    font-size: .7rem;
  }
  .management-row-actions {
    display: flex;
    gap: .35rem;
    align-items: start;
  }
  .management-editor {
    grid-column: 1 / 3;
    display: grid;
    gap: .45rem;
    margin-top: -.25rem;
  }
  .management-editor textarea {
    width: 100%;
    min-height: 92px;
    resize: vertical;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-bright);
    font-family: var(--mono);
    font-size: .7rem;
    line-height: 1.5;
    padding: .55rem;
    outline: none;
  }
  .memory-row {
    grid-template-columns: minmax(0, 1fr) auto;
  }
  .memory-row .management-editor { grid-column: 1 / 3; }
  .memory-controls {
    display: grid;
    grid-template-columns: minmax(120px, 1fr) 90px minmax(145px, 1fr);
    gap: .45rem;
  }
  .inline-input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: .68rem;
    padding: .35rem .45rem;
    min-width: 0;
  }
  @media (max-width: 900px) {
    .management-toolbar { grid-template-columns: 1fr 1fr; }
    .prompt-lab { grid-template-columns: 1fr; }
    .prompt-lab-run { justify-items: stretch; }
    .management-actions { justify-content: flex-start; flex-wrap: wrap; }
    .management-grid { grid-template-columns: 1fr; }
  }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,.7);
    display: flex; align-items: center; justify-content: center;
    padding: 2rem;
  }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    width: 100%; max-width: 900px;
    max-height: 90vh;
    display: flex; flex-direction: column;
  }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: .5rem .75rem;
    border-bottom: 1px solid var(--border);
    font-size: .7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--text-dim);
    font-family: var(--sans);
  }
  .modal-close {
    background: none; border: none; color: var(--text-dim);
    font-size: 1.2rem; cursor: pointer; padding: 0 .25rem;
  }
  .modal-close:hover { color: var(--text-bright); }
  .modal-body {
    flex: 1; overflow: auto;
    padding: .75rem;
    font-size: .65rem;
    line-height: 1.6;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
    margin: 0;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px }
  ::-webkit-scrollbar-track { background: var(--bg) }
  ::-webkit-scrollbar-thumb { background: var(--border-active); border-radius: 3px }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">Dashboard</div>
  <div class="topbar-sep"></div>
  <div class="tabs">
    <button class="tab-btn active" id="tab-logs">Logs</button>
    <button class="tab-btn" id="tab-management">Management</button>
  </div>
  <div class="topbar-sep"></div>
  <div class="status-badge" id="status-badge">
    <div class="status-dot"></div>
    <span id="status-text">0 active</span>
  </div>
  <div class="filters" id="log-filters">
    <select id="f-guild"><option value="">All guilds</option></select>
    <select id="f-channel"><option value="">All channels</option></select>
    <select id="f-user"><option value="">All users</option></select>
    <button class="btn" id="btn-refresh">Refresh</button>
  </div>
</div>

<div class="content" id="log-view">
  <div class="log-count" id="log-count"></div>
  <div id="log-list"></div>
</div>

<div class="content" id="management-view" hidden>
  <div class="management-toolbar">
    <select id="m-guild"><option value="">All guilds</option></select>
    <select id="m-channel"><option value="">All channels</option></select>
    <select id="m-scope">
      <option value="">All memory scopes</option>
      <option value="guild">Guild memories</option>
      <option value="user">User memories</option>
      <option value="self">Self memories</option>
    </select>
    <div class="management-actions">
      <label class="discord-delete-toggle" id="m-discord-delete-wrap">
        <input id="m-discord-delete" type="checkbox">
        Also delete in Discord
      </label>
      <button class="btn danger" id="m-delete-selected" disabled>Delete selected</button>
      <span style="color:var(--text-dim);font-size:.65rem">last</span>
      <input class="number-input" id="m-last-count" type="number" min="1" max="20" value="2">
      <button class="btn danger" id="m-delete-last" disabled>Delete</button>
      <button class="btn" id="m-refresh">Refresh</button>
    </div>
  </div>
  <div class="prompt-lab" id="prompt-lab">
    <select id="lab-user"><option value="">Sender</option></select>
    <textarea id="lab-prompt" placeholder="Test prompt as a virtual mention..."></textarea>
    <div class="prompt-lab-run">
      <button class="btn primary" id="lab-run">Run as mention</button>
      <div class="prompt-lab-status" id="lab-status">dry-run writes</div>
    </div>
  </div>
  <div class="prompt-lab-report" id="lab-report"></div>
  <div class="management-grid">
    <section>
      <div class="management-section-title">
        <span>Latest messages</span>
        <span id="m-message-count"></span>
      </div>
      <div class="management-list" id="m-message-list"></div>
    </section>
    <section>
      <div class="management-section-title">
        <span>Memories</span>
        <span id="m-memory-count"></span>
      </div>
      <div class="management-list" id="m-memory-list"></div>
    </section>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">LLM Request Payload</span>
      <button class="modal-close" id="modal-close">&times;</button>
    </div>
    <pre class="modal-body" id="modal-body"></pre>
  </div>
</div>

<script>
(function(){
  const logList = document.getElementById('log-list');
  const logCount = document.getElementById('log-count');
  const fGuild = document.getElementById('f-guild');
  const fChannel = document.getElementById('f-channel');
  const fUser = document.getElementById('f-user');
  const btnRefresh = document.getElementById('btn-refresh');
  const statusBadge = document.getElementById('status-badge');
  const statusText = document.getElementById('status-text');
  const tabLogs = document.getElementById('tab-logs');
  const tabManagement = document.getElementById('tab-management');
  const logFilters = document.getElementById('log-filters');
  const logView = document.getElementById('log-view');
  const managementView = document.getElementById('management-view');
  const mGuild = document.getElementById('m-guild');
  const mChannel = document.getElementById('m-channel');
  const mScope = document.getElementById('m-scope');
  const mRefresh = document.getElementById('m-refresh');
  const mDeleteSelected = document.getElementById('m-delete-selected');
  const mDeleteLast = document.getElementById('m-delete-last');
  const mLastCount = document.getElementById('m-last-count');
  const mDiscordDelete = document.getElementById('m-discord-delete');
  const mDiscordDeleteWrap = document.getElementById('m-discord-delete-wrap');
  const mMessageList = document.getElementById('m-message-list');
  const mMemoryList = document.getElementById('m-memory-list');
  const mMessageCount = document.getElementById('m-message-count');
  const mMemoryCount = document.getElementById('m-memory-count');
  const promptLab = document.getElementById('prompt-lab');
  const labUser = document.getElementById('lab-user');
  const labPrompt = document.getElementById('lab-prompt');
  const labRun = document.getElementById('lab-run');
  const labStatus = document.getElementById('lab-status');
  const labReport = document.getElementById('lab-report');
  const managementStateKey = '2b2v.dashboard.management.v1';
  const promptLabSenderStateKey = '2b2v.dashboard.promptLab.sender.v1';
  let activeTab = location.hash === '#management' ? 'management' : 'logs';
  let managementDirectory = { guilds: [], channels: [], users: [] };
  let managementMessages = [];
  let managementMemories = [];
  let editingMessageId = null;
  let editingMemoryId = null;
  let promptLabPollSeq = 0;
  const selectedManagementMessages = new Set();

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function fmtTime(iso) {
    const d = new Date(iso);
    return d.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  function fmtDuration(ms) {
    if (ms < 1000) return ms + 'ms';
    return (ms / 1000).toFixed(1) + 's';
  }

  function fmtDateTime(ms) {
    const d = new Date(ms);
    return d.toLocaleString('en-US', {
      month: '2-digit',
      day: '2-digit',
      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit',
      hour12: false
    });
  }

  function jsStr(s) {
    return JSON.stringify(String(s));
  }

  function fmtCost(calls) {
    let total = 0;
    for (const c of calls) {
      if (c.estimatedCostUsd != null) total += c.estimatedCostUsd;
    }
    if (total === 0) return null;
    return '$' + total.toFixed(4);
  }

  function fmtCache(call) {
    const hasTokens = call.cachedTokens != null || call.cacheWriteTokens != null;
    const hasDiscount = call.cacheDiscountUsd != null;
    if (!hasTokens && !hasDiscount) return '-';
    const parts = [];
    if (hasTokens) {
      const read = call.cachedTokens != null ? call.cachedTokens : 0;
      const write = call.cacheWriteTokens != null ? call.cacheWriteTokens : 0;
      parts.push(read + ' / ' + write);
    }
    if (hasDiscount) parts.push('$' + call.cacheDiscountUsd.toFixed(4));
    return parts.join(' | ');
  }

  function fmtTrigger(t) {
    if (t == null) return 'none';
    if (typeof t === 'string') return t;
    if (t.type) return t.type + (t.keyword ? ': ' + t.keyword : '');
    return JSON.stringify(t);
  }

  function triggerContextText(ctx) {
    if (ctx == null) return '';
    return ctx.translatedContent || ctx.content || ctx.sourceQuote || '';
  }

  function triggerContextMeta(ctx, entry, includeIds) {
    if (ctx == null) return '';
    const parts = [];
    const guildLabel = ctx.guildName || (entry && entry.guildId) || '';
    const channelLabel = ctx.channelName || (entry && entry.channelId) || '';
    if (guildLabel !== '') parts.push(guildLabel);
    if (channelLabel !== '') parts.push(channelLabel);
    if (ctx.authorUsername) parts.push('@' + ctx.authorUsername);
    if (includeIds === true && ctx.messageId) parts.push('msg ' + shortId(ctx.messageId));
    if (includeIds === true && ctx.sourceMessageId && ctx.sourceMessageId !== ctx.messageId) parts.push('source ' + shortId(ctx.sourceMessageId));
    return parts.join(' | ');
  }

  function fmtArgs(args) {
    if (args == null) return '';
    const s = JSON.stringify(args);
    return s.length > 120 ? s.slice(0, 120) + '...' : s;
  }

  function fmtResult(text) {
    if (text == null) return '-';
    // Try to detect and pretty-print JSON
    const trimmed = text.trim();
    if ((trimmed.startsWith('{') || trimmed.startsWith('[') || trimmed.startsWith('"')) ) {
      try { return JSON.stringify(JSON.parse(trimmed), null, 2); } catch {}
    }
    return text;
  }

  function fmtStatus(status, isError) {
    if (isError) return 'error';
    return status || 'completed';
  }

  function statusClass(status, isError) {
    return 'status-' + fmtStatus(status, isError);
  }

  function shortId(id) {
    if (id == null || id === '') return '';
    return String(id).length > 12 ? String(id).slice(0, 8) : String(id);
  }

  // Track which entries are expanded by requestId
  const expandedIds = new Set();
  const detailCache = new Map();
  const detailErrors = new Map();
  const detailRequests = new Map();
  const rowNodes = new Map();

  function htmlToElement(html) {
    const template = document.createElement('template');
    template.innerHTML = html.trim();
    return template.content.firstElementChild;
  }

  function syncAttributes(current, next) {
    for (const attr of Array.from(current.attributes)) {
      if (!next.hasAttribute(attr.name)) current.removeAttribute(attr.name);
    }
    for (const attr of Array.from(next.attributes)) {
      if (current.getAttribute(attr.name) !== attr.value) current.setAttribute(attr.name, attr.value);
    }
  }

  function patchNode(current, next) {
    if (current.nodeType !== next.nodeType || current.nodeName !== next.nodeName) {
      current.replaceWith(next);
      return next;
    }

    if (current.nodeType === Node.TEXT_NODE) {
      if (current.nodeValue !== next.nodeValue) current.nodeValue = next.nodeValue;
      return current;
    }

    if (current.nodeType !== Node.ELEMENT_NODE) return current;
    syncAttributes(current, next);

    let currentChild = current.firstChild;
    let nextChild = next.firstChild;
    while (nextChild !== null) {
      const followingNext = nextChild.nextSibling;
      if (currentChild === null) {
        current.appendChild(nextChild.cloneNode(true));
      } else {
        const followingCurrent = currentChild.nextSibling;
        patchNode(currentChild, nextChild);
        currentChild = followingCurrent;
      }
      nextChild = followingNext;
    }
    while (currentChild !== null) {
      const followingCurrent = currentChild.nextSibling;
      current.removeChild(currentChild);
      currentChild = followingCurrent;
    }
    return current;
  }

  function toggleExpand(requestId) {
    if (expandedIds.has(requestId)) {
      expandedIds.delete(requestId);
    } else {
      expandedIds.add(requestId);
    }

    const el = document.querySelector('[data-rid="' + requestId + '"]');
    if (!el) return;
    const expanded = expandedIds.has(requestId);
    el.classList.toggle('expanded', expanded);
    if (expanded) {
      renderDetailState(requestId);
      loadEntryDetail(requestId);
    }
  }

  // Store payloads by key for modal lookup (avoids inline JSON escaping issues)
  const payloadStore = new Map();

  function payloadButton(e, li, kind, payload) {
    if (payload == null) return '-';
    const pkey = e.requestId + ':' + li;
    const key = kind + ':' + pkey;
    payloadStore.set(key, payload);
    const label = kind === 'req' ? 'request' : 'response';
    const title = kind === 'req' ? 'Request' : 'Response';
    return '<button class="btn btn-sm" onclick="event.stopPropagation(); window.__showPayload(\'' + esc(key) + '\', \'' + title + '\')">' + label + '</button>';
  }

  function renderToolRowsForModel(modelCall, toolsById) {
    const emitted = modelCall.emittedToolCalls || [];
    if (emitted.length === 0) return '';

    const batches = [];
    const batchIndex = new Map();
    for (const emittedCall of emitted) {
      const execution = toolsById.get(emittedCall.id);
      const batchId = execution && execution.batchId ? execution.batchId : (emittedCall.batchId || 'unbatched');
      const batchKind = execution && execution.batchKind ? execution.batchKind : (emittedCall.batchKind || 'queued');
      const key = batchId + ':' + batchKind;
      if (!batchIndex.has(key)) {
        batchIndex.set(key, batches.length);
        batches.push({ id: batchId, kind: batchKind, calls: [] });
      }
      batches[batchIndex.get(key)].calls.push({ emitted: emittedCall, execution });
    }

    let html = '';
    for (const batch of batches) {
      const kind = batch.kind === 'parallel' ? 'parallel batch' : batch.kind === 'sequential' ? 'ordered call' : batch.kind;
      html += '<div class="batch-label">' + esc(kind) + (batch.id !== 'unbatched' ? ' ' + esc(batch.id) : '') + '</div>';
      html += '<table class="detail-table"><tr><th>Tool</th><th>Args</th><th>Duration</th><th>Status</th><th>Result</th></tr>';
      for (const row of batch.calls) {
        const t = row.execution;
        const emittedCall = row.emitted;
        const status = fmtStatus(t && t.status, t && t.isError);
        const args = t && t.args ? t.args : emittedCall.args;
        const result = t && t.result != null ? fmtResult(t.result) : (emittedCall.skippedReason || '');
        html += '<tr' + (status === 'error' ? ' class="tool-error"' : '') + '>'
          + '<td>' + esc(emittedCall.name) + '<div class="model-meta">' + esc(shortId(emittedCall.id)) + '</div></td>'
          + '<td class="tool-result">' + esc(JSON.stringify(args, null, 2)) + '</td>'
          + '<td>' + (t && t.durationMs != null ? fmtDuration(t.durationMs) : '-') + '</td>'
          + '<td class="' + esc(statusClass(status, false)) + '">' + esc(status) + '</td>'
          + '<td class="tool-result">' + (result !== '' ? esc(result) : '<span style="color:var(--text-dim);font-style:italic">pending</span>') + '</td>'
          + '</tr>';
      }
      html += '</table>';
    }
    return html;
  }

  function renderRuntimeTools(e) {
    const runtimeTools = (e.tools || []).filter(t => !t.modelRequestId);
    if (runtimeTools.length === 0) return '';
    let rows = '';
    for (const t of runtimeTools) {
      const status = fmtStatus(t.status, t.isError);
      rows += '<tr' + (status === 'error' ? ' class="tool-error"' : '') + '>'
        + '<td>' + esc(t.tool) + '</td>'
        + '<td class="tool-result">' + esc(JSON.stringify(t.args, null, 2)) + '</td>'
        + '<td>' + (t.durationMs != null ? fmtDuration(t.durationMs) : '-') + '</td>'
        + '<td class="' + esc(statusClass(status, false)) + '">' + esc(status) + '</td>'
        + '<td class="tool-result">' + esc(fmtResult(t.result)) + '</td>'
        + '</tr>';
    }
    return '<div class="detail-section"><div class="detail-label">Runtime Actions</div>'
      + '<table class="detail-table"><tr><th>Action</th><th>Args</th><th>Duration</th><th>Status</th><th>Result</th></tr>'
      + rows + '</table></div>';
  }

  function renderEntryDetail(e) {
    const toolsById = new Map();
    for (const t of e.tools || []) {
      if (t.id) toolsById.set(t.id, t);
    }

    let modelSections = '';
    for (let li = 0; li < e.llmCalls.length; li++) {
      const l = e.llmCalls[li];
      const status = fmtStatus(l.status, l.isError);
      const cost = l.estimatedCostUsd != null ? '$' + l.estimatedCostUsd.toFixed(4) : '-';
      const duration = l.durationMs != null ? fmtDuration(l.durationMs) : (status === 'running' ? 'running' : '-');
      modelSections += '<div class="model-request">'
        + '<div class="model-head">'
          + '<div>'
            + '<div class="model-title">Model Request #' + (li + 1) + ' <span class="' + esc(statusClass(status, false)) + '">' + esc(status) + '</span></div>'
            + '<div class="model-meta">' + esc(l.model) + ' | stop ' + esc(l.stopReason) + ' | ' + esc(l.contentTypes.join(', ') || 'no content yet') + '</div>'
          + '</div>'
          + '<div class="model-stats">'
            + '<span>' + esc(duration) + '</span>'
            + '<span>tokens <span class="stat-val">' + l.promptTokens + ' / ' + l.completionTokens + '</span></span>'
            + '<span>cache <span class="stat-val">' + esc(fmtCache(l)) + '</span></span>'
            + '<span class="entry-cost">' + esc(cost) + '</span>'
            + '<span>' + payloadButton(e, li, 'req', l.requestPayload) + '</span>'
            + '<span>' + payloadButton(e, li, 'res', l.responsePayload) + '</span>'
          + '</div>'
        + '</div>'
        + (l.error != null ? '<div class="error-text">' + esc(l.error) + '</div>' : '')
        + (l.outputText != null ? '<div class="tool-result">' + esc(l.outputText) + '</div>' : '')
        + renderToolRowsForModel(l, toolsById)
      + '</div>';
    }

    const contextText = triggerContextText(e.triggerContext);
    const contextMeta = triggerContextMeta(e.triggerContext, e, true);
    return (contextText !== '' || contextMeta !== '' ? '<div class="detail-section"><div class="detail-label">Trigger Context</div><div class="trigger-context">'
        + (contextMeta !== '' ? '<div class="model-meta">' + esc(contextMeta) + '</div>' : '')
        + (contextText !== '' ? esc(contextText) : '<span style="color:var(--text-dim);font-style:italic">no trigger text</span>')
      + '</div></div>' : '')
      + (e.error != null ? '<div class="detail-section"><div class="detail-label">Error</div><div class="error-text">' + esc(e.error) + '</div></div>' : '')
      + (e.llmCalls.length > 0 ? '<div class="detail-section"><div class="detail-label">Model Requests</div>' + modelSections + '</div>' : '')
      + renderRuntimeTools(e)
      + (e.error == null && e.tools.length === 0 && e.llmCalls.length === 0 ? '<div class="detail-state">No tool or LLM detail for this entry.</div>' : '');
  }

  function detailStateHtml(requestId) {
    const cached = detailCache.get(requestId);
    if (cached != null) return renderEntryDetail(cached);
    const error = detailErrors.get(requestId);
    if (error != null) return '<div class="detail-state error">' + esc(error) + '</div>';
    return '<div class="detail-state">Loading entry details...</div>';
  }

  function renderDetailState(requestId) {
    const detail = document.querySelector('[data-detail-rid="' + requestId + '"]');
    if (detail != null) detail.innerHTML = detailStateHtml(requestId);
  }

  async function loadEntryDetail(requestId) {
    const cached = detailCache.get(requestId);
    if (cached != null && cached.status !== 'active') return;
    if (detailRequests.has(requestId)) return;
    detailErrors.delete(requestId);
    const request = (async function() {
      const r = await fetch('/api/logs/' + encodeURIComponent(requestId));
      if (r.status === 401) { location.href = '/login'; return; }
      if (!r.ok) throw new Error('Unable to load entry details (' + r.status + ')');
      detailCache.set(requestId, await r.json());
    })();
    detailRequests.set(requestId, request);
    try {
      await request;
    } catch (err) {
      detailErrors.set(requestId, err instanceof Error ? err.message : 'Unable to load entry details');
    } finally {
      detailRequests.delete(requestId);
      if (expandedIds.has(requestId)) renderDetailState(requestId);
    }
  }

  function renderEntry(e) {
    const cost = e.estimatedCostUsd != null ? '$' + e.estimatedCostUsd.toFixed(4) : null;
    const hasErr = e.hasError === true;
    const isActive = e.status === 'active';
    const cls = ['entry'];
    if (hasErr) cls.push('has-error');
    if (isActive) cls.push('active');
    if (!e.agentRan && !isActive) cls.push('no-agent');
    if (expandedIds.has(e.requestId)) cls.push('expanded');

    const rid = esc(e.requestId);
    const contextText = triggerContextText(e.triggerContext);
    const contextMeta = triggerContextMeta(e.triggerContext, e, false);
    return '<div class="' + cls.join(' ') + '" data-rid="' + rid + '">'
      + '<div class="entry-header" onclick="window.__toggleExpand(\'' + rid + '\')">'
        + '<span class="entry-time">' + fmtTime(e.timestamp) + '</span>'
        + '<span class="entry-user">' + esc(e.authorUsername) + '</span>'
        + '<span class="entry-trigger">' + esc(fmtTrigger(e.trigger)) + '</span>'
        + (isActive ? '<span class="entry-status">running</span>' : '')
        + (hasErr ? '<span class="entry-error-badge">error</span>' : '')
        + '<div class="entry-stats">'
          + '<span>' + fmtDuration(e.totalDurationMs) + '</span>'
          + '<span>T:<span class="stat-val">' + e.toolCount + '</span></span>'
          + '<span>L:<span class="stat-val">' + e.llmCallCount + '</span></span>'
          + (cost ? '<span class="entry-cost">' + cost + '</span>' : '')
        + '</div>'
      + '</div>'
      + (contextText !== '' ? '<div class="entry-context"><span class="context-author">' + esc(contextMeta) + '</span>' + (contextMeta !== '' ? ' ' : '') + esc(contextText) + '</div>' : '')
      + '<div class="entry-detail" data-detail-rid="' + rid + '">' + (expandedIds.has(e.requestId) ? detailStateHtml(e.requestId) : '') + '</div>'
    + '</div>';
  }
  // Expose toggle for inline onclick
  window.__toggleExpand = toggleExpand;

  function currentLogParams() {
    const params = new URLSearchParams();
    if (fGuild.value) params.set('guildId', fGuild.value);
    if (fChannel.value) params.set('channelId', fChannel.value);
    if (fUser.value) params.set('authorUsername', fUser.value);
    return params;
  }

  async function fetchLogs() {
    const requestQuery = currentLogParams().toString();
    const r = await fetch('/api/logs?' + requestQuery);
    if (r.status === 401) { location.href = '/login'; return; }
    const data = await r.json();
    if (currentLogParams().toString() !== requestQuery) return;

    logCount.textContent = data.length + ' entries';
    if (data.length === 0) {
      rowNodes.clear();
      if (logList.children.length !== 1 || !logList.firstElementChild.classList.contains('empty-state')) {
        logList.replaceChildren(htmlToElement('<div class="empty-state">No log entries yet. Trigger some bot messages.</div>'));
      }
    } else {
      const emptyState = logList.querySelector('.empty-state');
      if (emptyState != null) emptyState.remove();
      const seen = new Set();
      let cursor = logList.firstElementChild;
      for (const entry of data) {
        seen.add(entry.requestId);
        const next = htmlToElement(renderEntry(entry));
        const existing = rowNodes.get(entry.requestId);
        const node = existing == null ? next : patchNode(existing, next);
        rowNodes.set(entry.requestId, node);
        if (node !== cursor) logList.insertBefore(node, cursor);
        cursor = node.nextElementSibling;
      }
      for (const [requestId, node] of Array.from(rowNodes.entries())) {
        if (seen.has(requestId)) continue;
        rowNodes.delete(requestId);
        node.remove();
      }
    }
  }

  async function fetchFilters() {
    const r = await fetch('/api/filters');
    if (r.status === 401) { location.href = '/login'; return; }
    const f = await r.json();
    const gv = fGuild.value, cv = fChannel.value, uv = fUser.value;
    fGuild.innerHTML = '<option value="">All guilds</option>' + f.guildIds.map(id => '<option value="'+esc(id)+'">'+esc(id)+'</option>').join('');
    fChannel.innerHTML = '<option value="">All channels</option>' + f.channelIds.map(id => '<option value="'+esc(id)+'">'+esc(id)+'</option>').join('');
    fUser.innerHTML = '<option value="">All users</option>' + f.usernames.map(u => '<option value="'+esc(u)+'">'+esc(u)+'</option>').join('');
    fGuild.value = gv; fChannel.value = cv; fUser.value = uv;
  }

  function loadManagementState() {
    try {
      const raw = localStorage.getItem(managementStateKey);
      if (raw == null) return;
      const state = JSON.parse(raw);
      if (typeof state.guildId === 'string') mGuild.value = state.guildId;
      if (typeof state.channelId === 'string') mChannel.value = state.channelId;
      if (typeof state.scope === 'string') mScope.value = state.scope;
      if (typeof state.lastCount === 'number') mLastCount.value = String(state.lastCount);
      if (typeof state.deleteDiscord === 'boolean') mDiscordDelete.checked = state.deleteDiscord;
      syncDiscordDeleteToggle();
    } catch {}
  }

  function saveManagementState() {
    localStorage.setItem(managementStateKey, JSON.stringify({
      guildId: mGuild.value,
      channelId: mChannel.value,
      scope: mScope.value,
      lastCount: Number(mLastCount.value) || 2,
      deleteDiscord: mDiscordDelete.checked === true
    }));
  }

  function promptLabSenderKey() {
    return mGuild.value + ':' + mChannel.value;
  }

  function loadPromptLabSender() {
    try {
      const raw = localStorage.getItem(promptLabSenderStateKey);
      if (raw == null) return '';
      const state = JSON.parse(raw);
      const key = promptLabSenderKey();
      return typeof state[key] === 'string' ? state[key] : '';
    } catch {
      return '';
    }
  }

  function savePromptLabSender() {
    try {
      const raw = localStorage.getItem(promptLabSenderStateKey);
      const state = raw == null ? {} : JSON.parse(raw);
      state[promptLabSenderKey()] = labUser.value;
      localStorage.setItem(promptLabSenderStateKey, JSON.stringify(state));
    } catch {}
  }

  function syncDiscordDeleteToggle() {
    mDiscordDeleteWrap.classList.toggle('active', mDiscordDelete.checked === true);
  }

  function discordDeleteEnabled() {
    return mDiscordDelete.checked === true;
  }

  function setTab(tab) {
    activeTab = tab;
    tabLogs.classList.toggle('active', tab === 'logs');
    tabManagement.classList.toggle('active', tab === 'management');
    logView.hidden = tab !== 'logs';
    managementView.hidden = tab !== 'management';
    logFilters.style.display = tab === 'logs' ? 'flex' : 'none';
    location.hash = tab === 'management' ? 'management' : 'logs';
    if (tab === 'management') {
      refreshManagement();
      if (logPollingActive && managementPollTimer === null) pollManagement();
    } else if (managementPollTimer !== null) {
      clearTimeout(managementPollTimer);
      managementPollTimer = null;
    }
  }

  function optionHtml(value, label, extra) {
    return '<option value="' + esc(value) + '"' + (extra || '') + '>' + esc(label) + '</option>';
  }

  function labelForGuild(id) {
    const hit = managementDirectory.guilds.find(g => g.id === id);
    return hit ? hit.name : id;
  }

  function labelForChannel(id) {
    const hit = managementDirectory.channels.find(c => c.id === id);
    return hit ? '#' + hit.name : id;
  }

  function syncManagementDeleteButtons() {
    const hasExactChannel = mGuild.value !== '' && mChannel.value !== '';
    mDeleteLast.disabled = !hasExactChannel;
    mDeleteSelected.disabled = selectedManagementMessages.size === 0;

  function renderPromptLabUsers() {
    const saved = loadPromptLabSender();
    const userMap = new Map();
    for (const message of managementMessages) {
      if (message.userId === '') continue;
      userMap.set(message.userId, message.authorDisplayName || message.authorUsername || message.userId);
    }
    for (const user of managementDirectory.users) {
      if (!userMap.has(user.id)) userMap.set(user.id, user.name);
    }

      .sort((a, b) => String(a[1]).localeCompare(String(b[1])) || String(a[0]).localeCompare(String(b[0])));

  function labStatusText(status, isError) {
    if (isError) return 'error';
    return status || 'completed';
  }

  function renderPromptLabLive(detail) {
    if (detail == null) return '';
    const llmRows = (detail.llmCalls || []).map((call, index) => {
      const status = labStatusText(call.status, call.isError);
      const cost = call.estimatedCostUsd != null ? ' · $' + Number(call.estimatedCostUsd).toFixed(4) : '';
      const duration = call.durationMs != null ? fmtDuration(call.durationMs) : status;
      return '<div class="lab-live-row">'
        + '<div class="lab-live-kind">Model</div>'
        + '<div><div class="lab-live-title">#' + (index + 1) + ' ' + esc(call.model || 'model') + '</div>'
          + '<div class="lab-live-meta">tokens ' + esc(String(call.promptTokens || 0)) + ' / ' + esc(String(call.completionTokens || 0)) + cost + '</div></div>'
        + '<div class="' + esc(statusClass(status, false)) + '">' + esc(duration) + '</div>'
      + '</div>';
    }).join('');
    const toolRows = (detail.tools || []).map((tool) => {
      const status = labStatusText(tool.status, tool.isError);
      const dry = tool.result && String(tool.result).includes('Prompt Lab dry-run') ? ' · dry-run' : '';
      const duration = tool.durationMs != null ? fmtDuration(tool.durationMs) : status;
      return '<div class="lab-live-row">'
        + '<div class="lab-live-kind">Tool</div>'
        + '<div><div class="lab-live-title">' + esc(tool.tool || 'tool') + dry + '</div>'
          + '<div class="lab-live-meta">' + esc(fmtArgs(tool.args || {})) + '</div></div>'
        + '<div class="' + esc(statusClass(status, false)) + '">' + esc(duration) + '</div>'
      + '</div>';
    }).join('');
    if (llmRows === '' && toolRows === '') {
      return '<div class="lab-live"><div class="detail-state">Waiting for model request...</div></div>';
    }
    return '<div class="lab-live"><div class="detail-label">Live request</div>' + llmRows + toolRows + '</div>';
  }

  function renderPromptLabReport(result, detail) {
    if (result == null) {
      labReport.classList.remove('active');
      labReport.innerHTML = '';
      return;
    }
    const cost = result.estimatedCostUsd != null ? '$' + Number(result.estimatedCostUsd).toFixed(4) : '-';
    const drafts = result.drafts || [];
    const dryRuns = result.dryRuns || [];
    labReport.classList.add('active');
    const isRunning = result.running === true || (detail && detail.status === 'active');
    labReport.innerHTML = '<div class="management-section-title"><span>' + (isRunning ? 'Prompt Lab Running' : 'Prompt Lab Run') + '</span><span>' + esc(shortId(result.requestId)) + '</span></div>'
      + '<div class="prompt-lab-summary">'
        + '<span>' + esc(fmtDuration(result.totalDurationMs || 0)) + '</span>'
        + '<span>L:<span class="stat-val">' + esc(String(result.llmCallCount || 0)) + '</span></span>'
        + '<span>T:<span class="stat-val">' + esc(String(result.toolCount || 0)) + '</span></span>'
        + '<span>dry:<span class="stat-val">' + esc(String(dryRuns.length)) + '</span></span>'
        + '<span class="entry-cost">' + esc(cost) + '</span>'
        + (result.error ? '<span class="tool-error">' + esc(result.error) + '</span>' : '')
      + '</div>'
      + (drafts.length > 0
        ? '<div class="detail-label">Draft replies</div>' + drafts.map(d => '<div class="draft-message">' + esc(d.text || '') + '</div>').join('')

        ? '<div class="detail-label" style="margin-top:.7rem">Dry-run writes</div>' + dryRuns.map(d => '<div class="dry-run-row">' + esc(d.tool) + ' ' + esc(JSON.stringify(d.args)) + '</div>').join('')

  async function fetchManagementData() {
    const messageQuery = managementParams().toString();
    const memoryQuery = memoryParams().toString();
    const [messagesRes, memoriesRes] = await Promise.all([
      fetch('/api/management/messages?' + messageQuery),
      fetch('/api/management/memories?' + memoryQuery)
    ]);
    if (messagesRes.status === 401 || memoriesRes.status === 401) { location.href = '/login'; return; }
    if (!messagesRes.ok || !memoriesRes.ok) throw new Error('Unable to load management data');
    const messageData = await messagesRes.json();
    const memoryData = await memoriesRes.json();
    if (managementParams().toString() !== messageQuery || memoryParams().toString() !== memoryQuery) return;
    managementMessages = messageData.messages || [];
    managementMemories = memoryData.memories || [];
    for (const id of Array.from(selectedManagementMessages)) {
      if (!managementMessages.some(m => m.id === id)) selectedManagementMessages.delete(id);
    }
    renderPromptLabUsers();
    renderManagement();
  }

  async function refreshManagement() {
    if (activeTab !== 'management') return;
    await fetchManagementDirectory();
    await fetchManagementData();
  }

  async function mutateManagement(request) {
    const r = await request();
    if (r.status === 401) { location.href = '/login'; return null; }
    const body = await r.json().catch(() => ({}));
    if (!r.ok || body.error) {
      alert(body.error || 'Management action failed');
      return null;
    }
    if (body.discordDeletion && body.discordDeletion.attempted === true && body.discordDeletion.failures && body.discordDeletion.failures.length > 0) {
      const sample = body.discordDeletion.failures.slice(0, 5)
        .map(f => shortId(f.messageId) + ': ' + f.error)
        .join('\n');
      alert('Local cleanup completed. Discord deletion failed for ' + body.discordDeletion.failures.length + ' message(s):\n' + sample);
    }
    await refreshManagement();
    return body;
  }

  async function fetchPromptLabDetailByRunToken(runToken) {
    const summariesRes = await fetch('/api/logs');
    if (summariesRes.status === 401) { location.href = '/login'; return null; }
    if (!summariesRes.ok) return null;
    const summaries = await summariesRes.json();
    const entry = summaries.find(e => e.trigger && e.trigger.type === 'prompt_lab' && e.trigger.runToken === runToken);
    if (!entry || !entry.requestId) return null;
    const detailRes = await fetch('/api/logs/' + encodeURIComponent(entry.requestId));
    if (!detailRes.ok) return null;
    return await detailRes.json();
  }

  async function pollPromptLabRun(runToken, seq) {
    if (seq !== promptLabPollSeq) return;
    try {
      const detail = await fetchPromptLabDetailByRunToken(runToken);
      if (detail != null && seq === promptLabPollSeq) {
        const estimatedCostUsd = (detail.llmCalls || []).reduce((sum, call) => sum + (call.estimatedCostUsd || 0), 0);
        renderPromptLabReport({
          requestId: detail.requestId,
          running: detail.status === 'active',
          drafts: [],
          dryRuns: [],
          toolCount: (detail.tools || []).length,
          llmCallCount: (detail.llmCalls || []).length,
          estimatedCostUsd: estimatedCostUsd > 0 ? estimatedCostUsd : null,
          totalDurationMs: detail.totalDurationMs || 0,
          error: detail.error
        }, detail);
      }
    } catch {}
    if (seq !== promptLabPollSeq) return;
    setTimeout(() => { pollPromptLabRun(runToken, seq); }, 700);
  }

  async function runPromptLab() {
    const guildId = mGuild.value;
    const channelId = mChannel.value;
    const userId = labUser.value;
    const content = labPrompt.value.trim();
    if (guildId === '' || channelId === '' || userId === '' || content === '') return;
    savePromptLabSender();
    const runToken = crypto.randomUUID();
    promptLabPollSeq += 1;
    const pollSeq = promptLabPollSeq;
    labRun.disabled = true;
    labStatus.textContent = 'RUNNING';
    labStatus.classList.add('running');
    labStatus.classList.remove('error');
    renderPromptLabReport({
      requestId: runToken,
      running: true,
      drafts: [],
      dryRuns: [],
      toolCount: 0,
      llmCallCount: 0,
      estimatedCostUsd: null,
      totalDurationMs: 0
    }, null);
    pollPromptLabRun(runToken, pollSeq);
    try {
      const r = await fetch('/api/management/prompt-lab/run', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ guildId, channelId, userId, content, runToken })
      });
      promptLabPollSeq += 1;
      if (r.status === 401) { location.href = '/login'; return; }
      const body = await r.json().catch(() => ({}));
      if (!r.ok) {
        labStatus.classList.add('error');
        alert(body.error || 'Prompt Lab run failed');
        return;
      }
      const finalDetail = body.requestId ? await fetch('/api/logs/' + encodeURIComponent(body.requestId)).then(res => res.ok ? res.json() : null).catch(() => null) : null;
      renderPromptLabReport(body, finalDetail);
      if (body.error) {
        labStatus.classList.add('error');
        labStatus.textContent = 'completed with error';
      } else {
        labStatus.textContent = 'complete';
      }
    } catch (err) {
      promptLabPollSeq += 1;
      labStatus.classList.add('error');
      alert(err instanceof Error ? err.message : 'Prompt Lab run failed');
    } finally {
      labStatus.classList.remove('running');
      syncManagementDeleteButtons();
      if (labStatus.textContent === 'RUNNING') labStatus.textContent = 'dry-run writes';
    }
  }

  async function deleteSelectedManagementMessages() {
    const selected = managementMessages.filter(m => selectedManagementMessages.has(m.id));
    if (selected.length === 0) return;
    const guildId = selected[0].guildId;
    const channelId = selected[0].channelId;
    if (!selected.every(m => m.guildId === guildId && m.channelId === channelId)) {
      alert('Selected deletes must be in one exact guild/channel. Filter to a channel or reduce the selection.');
      return;
    }
    const deleteDiscord = discordDeleteEnabled();
    const mode = deleteDiscord ? 'Local rows will be deleted and Discord deletion will be attempted.' : 'Discord will not be touched.';
    if (!confirm('Delete ' + selected.length + ' selected stored messages from ' + labelForGuild(guildId) + ' / ' + labelForChannel(channelId) + '? ' + mode)) return;
    await mutateManagement(() => fetch('/api/management/messages/delete-selected', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ guildId, channelId, messageIds: selected.map(m => m.id), deleteDiscord })

    try {
      const statusRes = await fetch('/api/status');
      if (statusRes.ok) {
        const d = await statusRes.json();
        if (d.activeRequests > 0) {
          statusBadge.classList.add('active');
          statusText.textContent = d.activeRequests + ' active';
        } else {
          statusBadge.classList.remove('active');
        }
      }
    } catch {}
  }

  let statusPollTimer = null;
  let logPollTimer = null;
  let logPollingActive = false;
  let managementPollTimer = null;

  async function pollLogs() {
    if (!logPollingActive) return;
    try {
      await refreshLogs();
      await refreshExpandedActiveDetails();
    } catch {}
    if (!logPollingActive) return;
    logPollTimer = setTimeout(() => { logPollTimer = null; pollLogs(); }, 1000);
  }

  async function pollManagement() {
    if (!logPollingActive || activeTab !== 'management') return;
    try { await refreshManagement(); } catch {}
    if (!logPollingActive || activeTab !== 'management') return;
    managementPollTimer = setTimeout(() => { managementPollTimer = null; pollManagement(); }, 1000);
  }

  function startPolling() {
    refreshStatus();
    if (statusPollTimer === null) statusPollTimer = setInterval(refreshStatus, 1000);
    if (!logPollingActive) {
      logPollingActive = true;
      pollLogs();
    }
    if (activeTab === 'management' && managementPollTimer === null) pollManagement();
  }

  function stopPolling() {
    if (statusPollTimer !== null) {
      clearInterval(statusPollTimer);
      statusPollTimer = null;
    }
    if (logPollTimer !== null) {
      clearTimeout(logPollTimer);
      logPollTimer = null;
    }
    if (managementPollTimer !== null) {
      clearTimeout(managementPollTimer);
      managementPollTimer = null;
    }
    logPollingActive = false;
  }

  async function refreshExpandedActiveDetails() {
    const activeIds = [];
    for (const requestId of expandedIds) {
      const cached = detailCache.get(requestId);
      const row = document.querySelector('[data-rid="' + requestId + '"]');
      if ((cached != null && cached.status === 'active') || (row != null && row.classList.contains('active'))) {
        activeIds.push(requestId);
      }
    }
    await Promise.all(activeIds.map((requestId) => loadEntryDetail(requestId)));
  }

  document.addEventListener('visibilitychange', () => {
    if (document.hidden) stopPolling(); else { startPolling(); }
  });

  // Modal for LLM request payloads
  const modalOverlay = document.getElementById('modal-overlay');
  const modalBody = document.getElementById('modal-body');
  const modalClose = document.getElementById('modal-close');

  // Format payload for display: pretty-print multiline strings, truncate base64 images
  function formatPayload(obj) {
    var json = JSON.stringify(obj, function(key, value) {
      // Truncate base64 image data (covers "data" field and data-URI in "url")
      if (typeof value === 'string') {
        if (key === 'data' && value.length > 200) {
          return '[base64 ' + Math.round(value.length / 1024) + 'KB]';
        }
        var dataUriMatch = key === 'url' && value.match(/^data:([^;]+);base64,/);
        if (dataUriMatch) {
          var b64 = value.substring(dataUriMatch[0].length);
          return 'data:' + dataUriMatch[1] + ';base64,[' + Math.round(b64.length / 1024) + 'KB truncated]';
        }
      }
      return value;
    }, 2);

    // Unescape \n/\t/\r in JSON string *values* so long prompts stay readable.
    var out = '';
    for (var i = 0; i < json.length; i++) {
      if (json[i] !== '"') {
        out += json[i];
        continue;
      }

      var j = i + 1;
      var escaped = false;
      var token = '';
      while (j < json.length) {
        var ch = json[j];
        if (escaped) {
          token += ch;
          escaped = false;
        } else if (ch === '\\') {
          token += ch;
          escaped = true;
        } else if (ch === '"') {
          break;
        } else {
          token += ch;
        }
        j += 1;
      }

      if (j >= json.length) {
        out += json.slice(i);
        break;
      }

      var k = j + 1;
      while (k < json.length && /\s/.test(json[k])) k += 1;
      var isKey = k < json.length && json[k] === ':';

      if (isKey || token.indexOf('\\') === -1) {
        out += '"' + token + '"';
      } else {
        var expanded = '';
        for (var t = 0; t < token.length; t++) {
          var cur = token[t];
          var next = t + 1 < token.length ? token[t + 1] : '';
          if (cur === '\\' && next === 'n') {
            expanded += '\n';
            t += 1;
          } else if (cur === '\\' && next === 't') {
            expanded += '\t';
            t += 1;
          } else if (cur === '\\' && next === 'r') {
            expanded += '\r';
            t += 1;
          } else if (cur === '\\' && next !== '') {
            expanded += cur + next;
            t += 1;
          } else {
            expanded += cur;
          }
        }
        out += '"' + expanded + '"';
      }

      i = j;
    }

    return out;
  }

  const modalTitle = document.querySelector('.modal-title');

  window.__showPayload = function(key, title) {
    const payload = payloadStore.get(key);
    if (payload == null) return;
    modalTitle.textContent = 'LLM ' + (title || 'Payload');
    modalBody.textContent = formatPayload(payload);
    modalOverlay.style.display = 'flex';
  };

  modalClose.addEventListener('click', function() { modalOverlay.style.display = 'none'; });
  modalOverlay.addEventListener('click', function(e) {
    if (e.target === modalOverlay) modalOverlay.style.display = 'none';
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') modalOverlay.style.display = 'none';
  });

  fetchFilters();
  fetchManagementDirectory()
    .then(() => {
      loadManagementState();
      return fetchManagementDirectory();
    })
    .catch(() => {})
    .finally(() => {
      setTab(activeTab);
      startPolling();
    });
})();
</script>
</body>
</html>
