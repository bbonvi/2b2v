  async function fetchManagementData(forceDomUpdate) {
    const messageQuery = managementParams().toString();
    const memoryQuery = memoryParams().toString();
    const [messagesRes, memoriesRes] = await Promise.all([
      fetch('/api/management/messages?' + messageQuery),
      fetch('/api/management/memories?' + memoryQuery)
    ]);
    if (messagesRes.status === 401 || memoriesRes.status === 401) { location.href = '/login'; return; }
    if (!messagesRes.ok || !memoriesRes.ok) throw new Error('Unable to load management data');
    const messageData = await messagesRes.json();
    const memoryData = await memoriesRes.json();
    if (managementParams().toString() !== messageQuery || memoryParams().toString() !== memoryQuery) return;
    if (forceDomUpdate !== true && managementSelectFocused()) return;
    managementMessages = messageData.messages || [];
    managementMemories = memoryData.memories || [];
    for (const id of Array.from(selectedManagementMessages)) {
      if (!managementMessages.some(m => m.id === id)) selectedManagementMessages.delete(id);
    }
    renderPromptLabUsers();
    renderManagement();
  }

  async function refreshManagement(forceDomUpdate) {
    if (activeTab !== 'management') return;
    if (forceDomUpdate !== true && managementSelectFocused()) return;
    const directoryUpdated = await fetchManagementDirectory(forceDomUpdate);
    if (directoryUpdated === false) return;
    await fetchManagementData(forceDomUpdate);
  }

  async function mutateManagement(request) {
    const r = await request();
    if (r.status === 401) { location.href = '/login'; return null; }
    const body = await r.json().catch(() => ({}));
    if (!r.ok || body.error) {
      alert(body.error || 'Management action failed');
      return null;
    }
    if (body.discordDeletion && body.discordDeletion.attempted === true && body.discordDeletion.failures && body.discordDeletion.failures.length > 0) {
      const sample = body.discordDeletion.failures.slice(0, 5)
        .map(f => shortId(f.messageId) + ': ' + f.error)
        .join('\n');
      alert('Local cleanup completed. Discord deletion failed for ' + body.discordDeletion.failures.length + ' message(s):\n' + sample);
    }
    await refreshManagement();
    return body;
  }

  async function fetchPromptLabDetailByRunToken(runToken) {
    const summariesRes = await fetch('/api/logs');
    if (summariesRes.status === 401) { location.href = '/login'; return null; }
    if (!summariesRes.ok) return null;
    const summaries = await summariesRes.json();
    const entry = summaries.find(e => e.trigger && e.trigger.runToken === runToken);
    if (!entry || !entry.requestId) return null;
    const detailRes = await fetch('/api/logs/' + encodeURIComponent(entry.requestId));
    if (!detailRes.ok) return null;
    return await detailRes.json();
  }

  async function pollPromptLabRun(runToken, seq) {
    if (seq !== promptLabPollSeq) return;
    try {
      const detail = await fetchPromptLabDetailByRunToken(runToken);
      if (detail != null && seq === promptLabPollSeq) {
        const estimatedCostUsd = (detail.llmCalls || []).reduce((sum, call) => sum + (call.estimatedCostUsd || 0), 0);
        renderPromptLabReport({
          requestId: detail.requestId,
          running: detail.status === 'active',
          drafts: [],
          dryRuns: [],
          toolCount: (detail.tools || []).length,
          runtimeActionCount: runtimeActionCount(detail),
          llmCallCount: (detail.llmCalls || []).length,
          estimatedCostUsd: estimatedCostUsd > 0 ? estimatedCostUsd : null,
          totalDurationMs: detail.totalDurationMs || 0,
          error: detail.error
        }, detail);
      }
    } catch {}
    if (seq !== promptLabPollSeq) return;
    setTimeout(() => { pollPromptLabRun(runToken, seq); }, 700);
  }

  async function runPromptLab() {
    const guildId = mGuild.value;
    const channelId = mChannel.value;
    const userId = labUser.value;
    const content = labPrompt.value.trim();
    if (guildId === '' || channelId === '' || userId === '' || content === '') return;
    savePromptLabSender();
    const runToken = crypto.randomUUID();
    promptLabPollSeq += 1;
    const pollSeq = promptLabPollSeq;
    labRun.disabled = true;
    labStatus.textContent = 'RUNNING';
    labStatus.classList.add('running');
    labStatus.classList.remove('error');
    renderPromptLabReport({
      requestId: runToken,
      running: true,
      drafts: [],
      dryRuns: [],
      toolCount: 0,
      runtimeActionCount: 0,
      llmCallCount: 0,
      estimatedCostUsd: null,
      totalDurationMs: 0
    }, null);
    pollPromptLabRun(runToken, pollSeq);
    try {
      const r = await fetch('/api/management/prompt-lab/run', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ guildId, channelId, userId, content, runToken })
      });
      promptLabPollSeq += 1;
      if (r.status === 401) { location.href = '/login'; return; }
      const body = await r.json().catch(() => ({}));
      if (!r.ok) {
        labStatus.classList.add('error');
        alert(body.error || 'Prompt Lab run failed');
        return;
      }
      const finalDetail = body.requestId ? await fetch('/api/logs/' + encodeURIComponent(body.requestId)).then(res => res.ok ? res.json() : null).catch(() => null) : null;
      renderPromptLabReport(body, finalDetail);
      if (body.error) {
        labStatus.classList.add('error');
        labStatus.textContent = 'completed with error';
      } else {
        labStatus.textContent = 'complete';
      }
    } catch (err) {
      promptLabPollSeq += 1;
      labStatus.classList.add('error');
      alert(err instanceof Error ? err.message : 'Prompt Lab run failed');
    } finally {
      labStatus.classList.remove('running');
      syncManagementDeleteButtons();
      if (labStatus.textContent === 'RUNNING') labStatus.textContent = 'dry-run writes';
    }
  }

  async function runPromptLabAmbientInitiative(kind) {
    const guildId = mGuild.value;
    const channelId = mChannel.value;
    if (guildId === '' || channelId === '') return;
    const runToken = crypto.randomUUID();
    promptLabPollSeq += 1;
    const pollSeq = promptLabPollSeq;
    labRun.disabled = true;
    labInitiativeButtons.forEach(btn => { btn.disabled = true; });
    labStatus.textContent = 'RUNNING';
    labStatus.classList.add('running');
    labStatus.classList.remove('error');
    renderPromptLabReport({
      requestId: runToken,
      running: true,
      drafts: [],
      dryRuns: [],
      toolCount: 0,
      runtimeActionCount: 0,
      llmCallCount: 0,
      estimatedCostUsd: null,
      totalDurationMs: 0
    }, null);
    pollPromptLabRun(runToken, pollSeq);
    try {
      const r = await fetch('/api/management/prompt-lab/ambient-initiative', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ guildId, channelId, kind, force: labInitiativeForce.checked, runToken })
      });
      promptLabPollSeq += 1;
      if (r.status === 401) { location.href = '/login'; return; }
      const body = await r.json().catch(() => ({}));
      if (!r.ok) {
        labStatus.classList.add('error');
        alert(body.error || 'Ambient initiative draft failed');
        return;
      }
      const finalDetail = body.requestId ? await fetch('/api/logs/' + encodeURIComponent(body.requestId)).then(res => res.ok ? res.json() : null).catch(() => null) : null;
      renderPromptLabReport(body, finalDetail);
      if (body.error) {
        labStatus.classList.add('error');
        labStatus.textContent = 'completed with error';
      } else {
        labStatus.textContent = 'complete';
      }
    } catch (err) {
      promptLabPollSeq += 1;
      labStatus.classList.add('error');
      alert(err instanceof Error ? err.message : 'Ambient initiative draft failed');
    } finally {
      labStatus.classList.remove('running');
      syncManagementDeleteButtons();
      if (labStatus.textContent === 'RUNNING') labStatus.textContent = 'dry-run writes';
    }
  }

  window.__toggleManagementMessage = function(messageId) {
    if (selectedManagementMessages.has(messageId)) selectedManagementMessages.delete(messageId);
    else selectedManagementMessages.add(messageId);
    syncManagementDeleteButtons();
    renderManagement();
  };

  window.__messageRowKey = function(event, messageId) {
    if (event.key !== 'Enter' && event.key !== ' ') return;
    event.preventDefault();
    window.__toggleManagementMessage(messageId);
  };

  window.__editManagementMessage = function(messageId) {
    editingMessageId = messageId;
    editingMemoryId = null;
    renderManagement();
  };

  window.__editManagementMemory = function(memoryId) {
    editingMemoryId = memoryId;
    editingMessageId = null;
    renderManagement();
  };

  window.__cancelManagementEdit = function() {
    editingMessageId = null;
    editingMemoryId = null;
    renderManagement();
  };

  window.__saveManagementMessage = async function(messageId, guildId, channelId) {
    const textarea = document.getElementById('edit-message-' + messageId);
    const content = textarea ? textarea.value : '';
    const body = await mutateManagement(() => fetch('/api/management/messages/' + encodeURIComponent(messageId), {
      method: 'PATCH',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ guildId, channelId, content })
    }));
    if (body !== null) {
      editingMessageId = null;
      renderManagement();
    }
  };

  window.__deleteManagementMessage = async function(messageId, guildId, channelId) {
    const deleteDiscord = discordDeleteEnabled();
    const targetText = deleteDiscord
      ? 'local context/search state and attempt Discord deletion'
      : 'local context/search state only';
    if (!confirm('Delete stored message ' + shortId(messageId) + ' from ' + targetText + '?')) return;
    await mutateManagement(() => fetch('/api/management/messages/' + encodeURIComponent(messageId)
      + '?guildId=' + encodeURIComponent(guildId)
      + '&channelId=' + encodeURIComponent(channelId)
      + '&deleteDiscord=' + encodeURIComponent(String(deleteDiscord)), { method: 'DELETE' }));
  };

  window.__saveManagementMemory = async function(memoryId) {
    const content = document.getElementById('edit-memory-content-' + memoryId)?.value || '';
    const kind = document.getElementById('edit-memory-kind-' + memoryId)?.value || 'note';
    const confidence = Number(document.getElementById('edit-memory-confidence-' + memoryId)?.value || '0.7');
    const important = document.getElementById('edit-memory-important-' + memoryId)?.checked === true;
    const expiresRaw = document.getElementById('edit-memory-expires-' + memoryId)?.value || '';
    const expiresAt = expiresRaw === '' ? null : new Date(expiresRaw).getTime();
    const body = await mutateManagement(() => fetch('/api/management/memories/' + encodeURIComponent(memoryId), {
      method: 'PATCH',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ content, kind, confidence, priority: important ? 1 : 0, expiresAt })
    }));
    if (body !== null) {
      editingMemoryId = null;
      renderManagement();
    }
  };

  window.__deleteManagementMemory = async function(memoryId) {
    if (!confirm('Delete memory #' + memoryId + '?')) return;
    await mutateManagement(() => fetch('/api/management/memories/' + encodeURIComponent(memoryId), { method: 'DELETE' }));
  };

  async function deleteSelectedManagementMessages() {
    const selected = managementMessages.filter(m => selectedManagementMessages.has(m.id));
    if (selected.length === 0) return;
    const guildId = selected[0].guildId;
    const channelId = selected[0].channelId;
    if (!selected.every(m => m.guildId === guildId && m.channelId === channelId)) {
      alert('Selected deletes must be in one exact guild/channel. Filter to a channel or reduce the selection.');
      return;
    }
    const deleteDiscord = discordDeleteEnabled();
    const mode = deleteDiscord ? 'Local rows will be deleted and Discord deletion will be attempted.' : 'Discord will not be touched.';
    if (!confirm('Delete ' + selected.length + ' selected stored messages from ' + labelForGuild(guildId) + ' / ' + labelForChannel(channelId) + '? ' + mode)) return;
    await mutateManagement(() => fetch('/api/management/messages/delete-selected', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ guildId, channelId, messageIds: selected.map(m => m.id), deleteDiscord })
    }));
    selectedManagementMessages.clear();
  }

  async function deleteLatestManagementMessages() {
    const guildId = mGuild.value;
    const channelId = mChannel.value;
    const count = Math.max(1, Math.min(20, Number(mLastCount.value) || 2));
    if (guildId === '' || channelId === '') return;
    const deleteDiscord = discordDeleteEnabled();
    const mode = deleteDiscord ? 'Local rows will be deleted and Discord deletion will be attempted.' : 'Discord will not be touched.';
    if (!confirm('Delete the latest ' + count + ' stored messages from ' + labelForGuild(guildId) + ' / ' + labelForChannel(channelId) + '? ' + mode)) return;
    await mutateManagement(() => fetch('/api/management/messages/delete-latest', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ guildId, channelId, count, deleteDiscord })
    }));
    selectedManagementMessages.clear();
  }

  let logRefreshRunning = false;
  let logRefreshQueued = false;

  async function refreshLogs() {
    if (logRefreshRunning) {
      logRefreshQueued = true;
      return;
    }

    logRefreshRunning = true;
    try {
      do {
        logRefreshQueued = false;
        await fetchLogs();
      } while (logRefreshQueued && !document.hidden);
    } finally {
      logRefreshRunning = false;
    }
  }

  async function refresh() {
    await Promise.all([refreshLogs(), fetchFilters()]);
  }

  btnRefresh.addEventListener('click', () => { refresh(); });
  fGuild.addEventListener('change', () => { refreshLogs(); });
  fChannel.addEventListener('change', () => { refreshLogs(); });
  fUser.addEventListener('change', () => { refreshLogs(); });
  tabLogs.addEventListener('click', () => { setTab('logs'); });
  tabManagement.addEventListener('click', () => { setTab('management'); });
  tabRelationship.addEventListener('click', () => { setTab('relationships'); });
  mRefresh.addEventListener('click', () => { refreshManagement(true); });
  mDeleteSelected.addEventListener('click', () => { deleteSelectedManagementMessages(); });
  mDeleteLast.addEventListener('click', () => { deleteLatestManagementMessages(); });
  mGuild.addEventListener('change', () => {
    saveManagementState();
    selectedManagementMessages.clear();
    renderPromptLabReport(null);
    refreshManagement(true).catch(() => {});
  });
  mChannel.addEventListener('change', () => {
    const opt = mChannel.selectedOptions[0];
    const guildId = opt ? opt.getAttribute('data-guild-id') : null;
    if (guildId != null && guildId !== '') mGuild.value = guildId;
    saveManagementState();
    selectedManagementMessages.clear();
    renderPromptLabReport(null);
    refreshManagement(true);
  });
  mScope.addEventListener('change', () => { saveManagementState(); refreshManagement(true); });
  mLastCount.addEventListener('change', () => { saveManagementState(); syncManagementDeleteButtons(); });
  mDiscordDelete.addEventListener('change', () => { syncDiscordDeleteToggle(); saveManagementState(); });
  labUser.addEventListener('change', () => { savePromptLabSender(); syncManagementDeleteButtons(); });
  labPrompt.addEventListener('input', () => { labStatus.textContent = 'dry-run writes'; syncManagementDeleteButtons(); });
  labPrompt.addEventListener('keydown', (event) => {
    if ((event.metaKey || event.ctrlKey) && event.key === 'Enter') {
      event.preventDefault();
      runPromptLab();
    }
  });
  labRun.addEventListener('click', () => { runPromptLab(); });
  labInitiativeButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      const kind = btn.getAttribute('data-initiative-kind');
      if (kind) runPromptLabAmbientInitiative(kind);
    });
  });

  async function refreshStatus() {
    try {
      const statusRes = await fetch('/api/status');
      if (statusRes.ok) {
        const d = await statusRes.json();
        if (d.activeRequests > 0) {
          statusBadge.classList.add('active');
          statusText.textContent = d.activeRequests + ' active';
        } else {
          statusBadge.classList.remove('active');
        }
      }
    } catch {}
  }

  let statusPollTimer = null;
  let logPollTimer = null;
  let logPollingActive = false;
  let managementPollTimer = null;

  async function pollLogs() {
    if (!logPollingActive) return;
    try {
      await refreshLogs();
      await refreshExpandedActiveDetails();
    } catch {}
    if (!logPollingActive) return;
    logPollTimer = setTimeout(() => { logPollTimer = null; pollLogs(); }, 1000);
  }

  async function pollManagement() {
    if (!logPollingActive || activeTab !== 'management') return;
    if (!managementSelectFocused()) {
      try { await refreshManagement(); } catch {}
    }
    if (!logPollingActive || activeTab !== 'management') return;
    managementPollTimer = setTimeout(() => { managementPollTimer = null; pollManagement(); }, 1000);
  }

  function startPolling() {
    refreshStatus();
    if (statusPollTimer === null) statusPollTimer = setInterval(refreshStatus, 1000);
    if (!logPollingActive) {
      logPollingActive = true;
      pollLogs();
    }
    if (activeTab === 'management' && managementPollTimer === null) pollManagement();
  }

  function stopPolling() {
    if (statusPollTimer !== null) {
      clearInterval(statusPollTimer);
      statusPollTimer = null;
    }
    if (logPollTimer !== null) {
      clearTimeout(logPollTimer);
      logPollTimer = null;
    }
    if (managementPollTimer !== null) {
      clearTimeout(managementPollTimer);
      managementPollTimer = null;
    }
    logPollingActive = false;
  }

  async function refreshExpandedActiveDetails() {
    const activeIds = [];
    for (const requestId of expandedIds) {
      const cached = detailCache.get(requestId);
      const row = document.querySelector('[data-rid="' + requestId + '"]');
      if ((cached != null && cached.status === 'active') || (row != null && row.classList.contains('active'))) {
        activeIds.push(requestId);
      }
    }
    await Promise.all(activeIds.map((requestId) => loadEntryDetail(requestId)));
  }

  document.addEventListener('visibilitychange', () => {
    if (document.hidden) stopPolling(); else { startPolling(); }
  });

  // Modal for LLM request payloads
  const modalOverlay = document.getElementById('modal-overlay');
  const modalBody = document.getElementById('modal-body');
  const modalClose = document.getElementById('modal-close');
  const payloadAutoExpandMaxChars = 60000;
  const payloadAutoExpandMaxItems = 140;

  function payloadType(value) {
    if (value === null) return 'null';
    if (Array.isArray(value)) return 'array';
    return typeof value;
  }

  function payloadApproxSize(value, limit, seen) {
    if (value == null) return 4;
    if (typeof value === 'string') return value.length;
    if (typeof value !== 'object') return String(value).length;
    if (seen.has(value)) return 10;
    seen.add(value);
    const entries = Array.isArray(value) ? value.map((item, index) => [String(index), item]) : Object.entries(value);
    let total = 2;
    for (const [key, item] of entries) {
      total += String(key).length + 2 + payloadApproxSize(item, limit - total, seen);
      if (total > limit) return total;
    }
    return total;
  }

  function shouldAutoExpandPayload(value, entries, depth, keyName) {
    if (depth === 0) return true;
    if (keyName === 'input') return true;
    if (keyName === 'tools') return false;
    if (entries.length > payloadAutoExpandMaxItems) return false;
    return payloadApproxSize(value, payloadAutoExpandMaxChars + 1, new WeakSet()) <= payloadAutoExpandMaxChars;
  }

  function renderPayloadPrimitive(value) {
    if (value === null) return '<span class="payload-primitive payload-null">null</span>';
    if (typeof value === 'string') return '<span class="payload-primitive payload-string">"' + esc(value) + '"</span>';
    return '<span class="payload-primitive">' + esc(String(value)) + '</span>';
  }

  function renderPayloadTree(value, depth, keyName) {
    const type = payloadType(value);
    if (type === 'string') return renderPayloadPrimitive(value);
    if (type !== 'object' && type !== 'array') return renderPayloadPrimitive(value);

    const isArray = Array.isArray(value);
    const entries = isArray ? value.map((item, index) => [String(index), item]) : Object.entries(value || {});
    const open = shouldAutoExpandPayload(value, entries, depth, keyName) ? ' open' : '';
    const summary = isArray
      ? '[' + entries.length + ' item' + (entries.length === 1 ? '' : 's') + ']'
      : '{' + entries.length + ' key' + (entries.length === 1 ? '' : 's') + '}';
    const large = open === '' ? ' payload-large' : '';
    if (entries.length === 0) return '<span class="payload-primitive">' + (isArray ? '[]' : '{}') + '</span>';
    return '<details class="payload-collapsible' + large + '"' + open + '>'
      + '<summary>' + esc(summary) + '</summary>'
      + '<div class="payload-node">'
        + entries.map(([key, item]) => '<div class="payload-row">'
          + '<span class="payload-key">' + esc(key) + '</span>'
          + '<span>' + renderPayloadTree(item, depth + 1, key) + '</span>'
        + '</div>').join('')
      + '</div>'
      + '</details>';
  }

  function normalizePayloadForTree(payload) {
    if (typeof payload !== 'string') return payload;
    const trimmed = payload.trim();
    if (!(trimmed.startsWith('{') || trimmed.startsWith('['))) return payload;
    try {
      return JSON.parse(trimmed);
    } catch {
      return payload;
    }
  }

  const modalTitle = document.querySelector('.modal-title');

  window.__showPayload = function(key, title) {
    const payload = payloadStore.get(key);
    if (payload == null) return;
    modalTitle.textContent = title || 'Payload';
    modalBody.innerHTML = renderPayloadTree(normalizePayloadForTree(payload), 0);
    modalOverlay.style.display = 'flex';
  };

  document.addEventListener('click', function(e) {
    const target = e.target;
    if (!(target instanceof Element)) return;
    const button = target.closest('.payload-btn');
    if (button == null) return;
    e.stopPropagation();
    const key = button.getAttribute('data-payload-key');
    if (key == null) return;
    window.__showPayload(key, button.getAttribute('data-payload-title') || 'Payload');
  });

  modalClose.addEventListener('click', function() { modalOverlay.style.display = 'none'; });
  modalOverlay.addEventListener('click', function(e) {
    if (e.target === modalOverlay) modalOverlay.style.display = 'none';
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') modalOverlay.style.display = 'none';
  });

  fetchFilters();
  fetchManagementDirectory()
    .then(() => {
      loadManagementState();
      return fetchManagementDirectory();
    })
    .catch(() => {})
    .finally(() => {
      setTab(activeTab);
      startPolling();
    });
})();
</script>
