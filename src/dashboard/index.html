<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Request Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

  :root {
    --bg: #08090a;
    --surface: #0f1012;
    --surface-2: #161819;
    --border: #1e2123;
    --border-active: #2a2d31;
    --text: #c4c9cf;
    --text-dim: #6b7280;
    --text-bright: #e8ecf0;
    --accent: #3d8bfd;
    --accent-dim: #1a3a6b;
    --green: #22c55e;
    --green-dim: #0a2f1a;
    --red: #ef4444;
    --red-dim: #3b1111;
    --amber: #f59e0b;
    --amber-dim: #3b2a06;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--mono);
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* Top bar */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 1.25rem;
    display: flex; align-items: center; gap: 1rem;
    height: 48px;
  }
  .topbar-title {
    font-size: .7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .18em;
    color: var(--text-dim);
    white-space: nowrap;
    font-family: var(--sans);
  }
  .topbar-sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0 }

  .status-badge {
    display: none;
    align-items: center; gap: .4rem;
    font-size: .7rem;
    color: var(--amber);
    font-weight: 500;
  }
  .status-badge.active { display: flex }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--amber);
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1 }
    50% { opacity: .3 }
  }

  .filters {
    display: flex; gap: .5rem; margin-left: auto; align-items: center;
  }
  select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: .7rem;
    padding: .35rem .5rem;
    outline: none;
    cursor: pointer;
    min-width: 100px;
    max-width: 180px;
  }
  select:focus { border-color: var(--accent) }

  .btn {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: .7rem;
    padding: .35rem .7rem;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: .08em;
  }
  .btn:hover { border-color: var(--accent); color: var(--text-bright) }
  .btn.danger { color: var(--red); border-color: var(--red-dim); }
  .btn.danger:hover { border-color: var(--red); color: #ffb4b4; }
  .btn.primary { color: var(--text-bright); border-color: var(--accent-dim); }
  .btn:disabled {
    opacity: .35;
    cursor: not-allowed;
    border-color: var(--border);
    color: var(--text-dim);
  }
  .tabs { display: flex; gap: .35rem; align-items: center; }
  .tab-btn {
    background: transparent;
    border: 1px solid transparent;
    color: var(--text-dim);
    font-family: var(--sans);
    font-size: .68rem;
    font-weight: 600;
    letter-spacing: .12em;
    text-transform: uppercase;
    padding: .32rem .55rem;
    cursor: pointer;
  }
  .tab-btn.active {
    color: var(--text-bright);
    border-color: var(--border-active);
    background: var(--bg);
  }

  /* Content */
  .content { padding: 1rem 1.25rem; }
  .content[hidden] { display: none; }

  .log-count {
    font-size: .65rem;
    color: var(--text-dim);
    margin-bottom: .75rem;
    text-transform: uppercase;
    letter-spacing: .1em;
  }
  #log-list {
    max-width: 1200px;
    margin: auto;
  }

  /* Log entries */
  .entry {
    background: var(--surface);
    border: 1px solid var(--border);
    margin-bottom: 2px;
    transition: border-color .1s;
  }
  .entry:hover { border-color: var(--border-active) }
  .entry.has-error { border-left: 2px solid var(--red) }
  .entry.no-agent { opacity: .5 }

  .entry-header {
    display: grid;
    grid-template-columns: 68px 152px minmax(78px, 130px) minmax(150px, 260px) minmax(180px, 1fr) auto;
    align-items: center;
    gap: .65rem;
    padding: .5rem .75rem;
    font-size: .72rem;
    cursor: pointer;
    min-height: 40px;
  }
  .entry-time {
    color: var(--text-dim);
    font-size: .65rem;
    white-space: nowrap;
  }
  .entry-user {
    color: var(--accent);
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .entry-location,
  .entry-message {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .entry-location {
    color: var(--text-dim);
    font-size: .64rem;
  }
  .entry-message {
    color: var(--text);
    font-size: .68rem;
  }
  .event-label {
    display: block;
    font-size: .65rem;
    font-weight: 700;
    letter-spacing: .07em;
    text-transform: uppercase;
    white-space: nowrap;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .event-none { color: var(--text-dim); }
  .event-mention { color: #60a5fa; }
  .event-keyword { color: #f59e0b; }
  .event-random { color: #a78bfa; }
  .event-ambient-attention-evaluator { color: #38bdf8; }
  .event-ambient-initiative-evaluator { color: #2dd4bf; }
  .event-background-memory-extraction { color: #34d399; }
  .event-async-image-generation { color: #fb7185; }
  .event-prompt-lab { color: #c084fc; }
  .event-custom { color: #e5e7eb; }
  .event-detail {
    color: var(--text-dim);
    font-weight: 400;
    letter-spacing: 0;
    text-transform: none;
  }
  .entry-stats {
    display: flex; gap: .75rem;
    font-size: .65rem;
    color: var(--text-dim);
  }
  .entry-stats span { white-space: nowrap }
  .stat-val { color: var(--text) }
  .entry-error-badge {
    background: var(--red-dim);
    color: var(--red);
    font-size: .6rem;
    font-weight: 600;
    padding: .1rem .35rem;
    text-transform: uppercase;
    letter-spacing: .05em;
  }
  .entry-cost {
    color: var(--green);
  }

  /* Expanded detail */
  .entry-detail {
    display: none;
    border-top: 1px solid var(--border);
    padding: .9rem;
    background: #0a0b0c;
  }
  .entry.expanded .entry-detail { display: block }

  .detail-flow {
    display: grid;
    gap: .45rem;
  }
  .detail-block {
    border: 1px solid var(--border);
    border-left: 3px solid var(--border-active);
    background: #0e0f11;
  }
  .detail-input { border-left-color: var(--accent); }
  .detail-model { border-left-color: #8b5cf6; }
  .detail-actions { border-left-color: var(--green); }
  .detail-error { border-left-color: var(--red); }
  .detail-block-head {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: .85rem;
    align-items: center;
    padding: .6rem .7rem;
    border-bottom: 1px solid var(--border);
  }
  .detail-kicker {
    display: block;
    color: var(--text-dim);
    font-family: var(--sans);
    font-size: .58rem;
    font-weight: 700;
    letter-spacing: .15em;
    text-transform: uppercase;
    margin-bottom: .12rem;
  }
  .detail-title {
    color: var(--text-bright);
    font-size: .78rem;
    font-weight: 700;
  }
  .detail-subtitle {
    color: var(--text-dim);
    font-size: .62rem;
    margin-top: .12rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .detail-body {
    padding: .65rem .7rem;
  }
  .stage-block {
    border: 1px solid var(--border);
    border-left: 3px solid var(--border-active);
    background: #0d0e10;
  }
  .stage-block.stage-input { border-left-color: var(--accent); }
  .stage-block.stage-model { border-left-color: #8b5cf6; }
  .stage-block.stage-evaluator { border-left-color: #38bdf8; }
  .stage-block.stage-runtime { border-left-color: var(--green); }
  .stage-block.stage-error { border-left-color: var(--red); }
  .stage-head {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: .75rem;
    align-items: start;
    padding: .52rem .62rem;
    border-bottom: 1px solid var(--border);
  }
  .stage-title-row {
    display: flex;
    flex-wrap: wrap;
    gap: .35rem .65rem;
    align-items: baseline;
  }
  .stage-title {
    color: var(--text-bright);
    font-size: .76rem;
    font-weight: 700;
  }
  .stage-kind {
    color: var(--text-dim);
    font-family: var(--sans);
    font-size: .56rem;
    font-weight: 700;
    letter-spacing: .14em;
    text-transform: uppercase;
  }
  .stage-meta {
    color: var(--text-dim);
    font-size: .6rem;
    margin-top: .12rem;
  }
  .stage-actions {
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-end;
    gap: .35rem;
  }
  .stage-body {
    padding: .55rem .62rem;
    display: grid;
    gap: .5rem;
  }
  .stage-output {
    background: #08090a;
    border: 1px solid #121518;
    border-left: 2px solid var(--border-active);
    padding: .48rem .55rem;
    color: var(--text);
    font-size: .68rem;
    white-space: pre-wrap;
    overflow-wrap: anywhere;
  }
  .stage-output.empty {
    color: var(--text-dim);
    font-style: italic;
  }
  .stage-more {
    margin-top: .28rem;
  }
  .stage-more summary {
    color: var(--accent);
    cursor: pointer;
    font-size: .6rem;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
  }
  .stage-more span {
    display: block;
    margin-top: .28rem;
  }
  .stage-output-label {
    display: block;
    color: var(--text-dim);
    font-family: var(--sans);
    font-size: .54rem;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    margin-bottom: .22rem;
  }
  .stage-subtitle {
    color: var(--text-dim);
    font-size: .6rem;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
  }
  .stage-tool-list {
    display: grid;
    gap: .38rem;
  }
  .stage-tool {
    display: grid;
    grid-template-columns: minmax(140px, .42fr) minmax(0, 1fr) minmax(0, 1fr);
    gap: .5rem;
    border-top: 1px solid var(--border);
    padding-top: .45rem;
  }
  .stage-tool:first-child {
    border-top: none;
    padding-top: 0;
  }
  .stage-tool-name {
    color: var(--text-bright);
    font-size: .68rem;
    font-weight: 700;
  }
  .stage-tool-meta {
    color: var(--text-dim);
    font-size: .58rem;
    margin-top: .12rem;
  }
  .detail-section {
    margin-bottom: .95rem;
  }
  .detail-section:last-child { margin-bottom: 0 }
  .detail-label {
    font-size: .6rem;
    text-transform: uppercase;
    letter-spacing: .15em;
    color: var(--text-dim);
    margin-bottom: .35rem;
    font-family: var(--sans);
    font-weight: 600;
  }
  .model-request {
    border-top: 1px solid var(--border);
    padding: .75rem 0;
  }
  .model-request:first-child { border-top: none; padding-top: 0 }
  .model-head {
    display: grid;
    grid-template-columns: minmax(220px, 1fr) auto;
    gap: .75rem;
    align-items: center;
    margin-bottom: .55rem;
  }
  .model-title {
    color: var(--text-bright);
    font-size: .72rem;
    font-weight: 600;
  }
  .model-meta {
    color: var(--text-dim);
    font-size: .62rem;
    margin-top: .15rem;
  }
  .model-stats {
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-end;
    gap: .35rem .7rem;
    color: var(--text-dim);
    font-size: .62rem;
  }
  .status-running { color: var(--amber) }
  .status-completed { color: var(--green) }
  .status-error { color: var(--red) }
  .status-skipped { color: var(--text-dim) }
  .batch-label {
    color: var(--text-dim);
    font-size: .6rem;
    text-transform: uppercase;
    letter-spacing: .08em;
    margin: .55rem 0 .3rem;
  }
  .metric-grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-end;
    gap: .35rem;
  }
  .metric {
    min-width: 66px;
    background: #090a0b;
    border: 1px solid var(--border);
    padding: .22rem .4rem;
  }
  .metric-label {
    display: block;
    color: var(--text-dim);
    font-size: .54rem;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
  }
  .metric-value {
    color: var(--text);
    font-size: .65rem;
    white-space: nowrap;
  }
  .payload-actions {
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-end;
    gap: .35rem;
    margin-top: .35rem;
  }
  .entry.active { border-left: 2px solid var(--amber) }
  .entry-status {
    color: var(--amber);
    font-size: .6rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .05em;
  }

  .detail-table {
    width: 100%;
    border-collapse: collapse;
    font-size: .68rem;
  }
  .detail-table.tool-table {
    table-layout: fixed;
  }
  .tool-table th:nth-child(1), .tool-table td:nth-child(1) { width: 30%; }
  .tool-table th:nth-child(2), .tool-table td:nth-child(2) { width: 13%; }
  .tool-table th:nth-child(3), .tool-table td:nth-child(3) { width: 11%; }
  .tool-table th:nth-child(4), .tool-table td:nth-child(4) { width: 23%; }
  .tool-table th:nth-child(5), .tool-table td:nth-child(5) { width: 23%; }
  .detail-table th {
    text-align: left;
    font-weight: 500;
    color: var(--text-dim);
    padding: .25rem .5rem;
    border-bottom: 1px solid var(--border);
    font-size: .6rem;
    text-transform: uppercase;
    letter-spacing: .08em;
  }
  .detail-table td {
    padding: .25rem .5rem;
    border-bottom: 1px solid #0d0e10;
    vertical-align: top;
  }
  .detail-table tr:last-child td { border-bottom: none }
  .tool-error { color: var(--red) }
  .tool-args {
    color: var(--text-dim);
    font-size: .62rem;
    max-width: 400px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .tool-result {
    color: var(--text-dim);
    font-size: .62rem;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .inline-snippet {
    display: block;
    color: var(--text-dim);
    font-size: .62rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-top: .18rem;
  }
  .output-block {
    color: var(--text);
    background: #0b0c0d;
    border-left: 2px solid var(--border-active);
    padding: .45rem .55rem;
    margin-bottom: .45rem;
    font-size: .68rem;
    white-space: pre-wrap;
    overflow-wrap: anywhere;
  }
  .message-block {
    color: var(--text-bright);
    background: #090a0b;
    border: 1px solid #111417;
    padding: .55rem .65rem;
    font-size: .73rem;
    white-space: pre-wrap;
    overflow-wrap: anywhere;
  }
  .message-meta {
    color: var(--text-dim);
    font-size: .62rem;
    margin-bottom: .35rem;
  }
  .action-list {
    display: grid;
    gap: .35rem;
  }
  .action-row {
    display: grid;
    grid-template-columns: minmax(130px, .65fr) minmax(110px, .5fr) minmax(0, 1fr) minmax(0, 1fr);
    gap: .65rem;
    align-items: center;
    background: #0b0c0d;
    border: 1px solid #111417;
    padding: .48rem .55rem;
  }
  .action-row.tool-error {
    border-color: var(--red-dim);
    background: rgba(239,68,68,.055);
  }
  .action-name {
    color: var(--text-bright);
    font-size: .7rem;
    font-weight: 700;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .action-id {
    color: var(--text-dim);
    font-size: .56rem;
    margin-top: .1rem;
  }
  .action-meta {
    display: flex;
    flex-wrap: wrap;
    gap: .45rem;
    color: var(--text-dim);
    font-size: .62rem;
  }
  .action-payload {
    min-width: 0;
  }
  .error-text {
    color: var(--red);
    background: var(--red-dim);
    padding: .35rem .5rem;
    font-size: .7rem;
  }
  .trigger-context {
    color: var(--text);
    background: #0b0c0d;
    border-left: 2px solid var(--border-active);
    padding: .45rem .6rem;
    font-size: .68rem;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .detail-state {
    color: var(--text-dim);
    font-size: .7rem;
    padding: .35rem 0;
  }
  .detail-state.error { color: var(--red) }

  .empty-state {
    text-align: center;
    padding: 4rem 1rem;
    color: var(--text-dim);
    font-size: .75rem;
  }

  .btn-sm { font-size: .6rem; padding: .15rem .4rem; }

  @media (max-width: 1050px) {
    .entry-header {
      grid-template-columns: 62px 126px minmax(70px, 110px) minmax(90px, 170px) minmax(120px, 1fr) auto;
    }
    .detail-block-head,
    .action-row,
    .stage-head,
    .stage-tool {
      grid-template-columns: 1fr;
    }
    .metric-grid,
    .payload-actions,
    .stage-actions {
      justify-content: flex-start;
    }
  }

  .management-toolbar {
    display: grid;
    grid-template-columns: minmax(140px, 220px) minmax(160px, 260px) minmax(90px, 130px) auto;
    gap: .5rem;
    align-items: center;
    margin-bottom: .85rem;
  }
  .management-actions { display: flex; gap: .45rem; justify-content: flex-end; align-items: center; }
  .discord-delete-toggle {
    display: flex;
    align-items: center;
    gap: .35rem;
    border: 1px solid var(--border);
    background: var(--surface-2);
    color: var(--text-dim);
    font-size: .62rem;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    padding: .28rem .45rem;
  }
  .discord-delete-toggle input {
    width: 14px;
    height: 14px;
    accent-color: var(--red);
  }
  .discord-delete-toggle.active {
    border-color: var(--red);
    background: var(--red-dim);
    color: #ffb4b4;
  }
  .number-input {
    width: 54px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: .7rem;
    padding: .35rem .4rem;
    outline: none;
  }
  .number-input:focus, textarea:focus, input:focus { border-color: var(--accent); }
  .prompt-lab {
    display: none;
    grid-template-columns: minmax(150px, 220px) minmax(0, 1fr) auto;
    gap: .5rem;
    align-items: start;
    margin-bottom: .85rem;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: .65rem 0;
  }
  .prompt-lab.active { display: grid; }
  .prompt-lab textarea {
    width: 100%;
    min-height: 68px;
    resize: vertical;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-bright);
    font-family: var(--mono);
    font-size: .75rem;
    line-height: 1.45;
    padding: .55rem;
    outline: none;
  }
  .prompt-lab-run {
    display: grid;
    gap: .4rem;
    justify-items: end;
  }
  .prompt-lab-initiative {
    display: grid;
    grid-template-columns: 1fr;
    gap: .3rem;
    width: 100%;
  }
  .prompt-lab-initiative .btn {
    width: 100%;
    font-size: .62rem;
    padding: .38rem .45rem;
  }
  .prompt-lab-status {
    color: var(--text-dim);
    font-size: .62rem;
    text-align: right;
    border: 1px solid transparent;
    padding: .28rem .4rem;
    min-width: 74px;
  }
  .prompt-lab-status.running {
    color: var(--amber);
    border-color: var(--amber);
    background: var(--amber-dim);
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
  }
  .prompt-lab-status.error {
    color: var(--red);
    border-color: var(--red);
    background: var(--red-dim);
    font-weight: 700;
  }
  .prompt-lab-report {
    display: none;
    margin-bottom: 1rem;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: .65rem 0;
  }
  .prompt-lab-report.active { display: block; }
  .prompt-lab-summary {
    display: flex;
    flex-wrap: wrap;
    gap: .4rem .75rem;
    color: var(--text-dim);
    font-size: .63rem;
    margin-bottom: .55rem;
  }
  .draft-message {
    border-left: 3px solid var(--green);
    background: rgba(34,197,94,.055);
    padding: .45rem .55rem;
    margin-top: .35rem;
    white-space: pre-wrap;
    overflow-wrap: anywhere;
    font-size: .72rem;
  }
  .lab-live {
    margin-top: .75rem;
    border-top: 1px solid var(--border);
    padding-top: .6rem;
  }
  .lab-live-row {
    display: grid;
    grid-template-columns: 80px minmax(0, 1fr) auto;
    gap: .5rem;
    align-items: start;
    border-bottom: 1px solid var(--border);
    padding: .35rem 0;
    font-size: .65rem;
  }
  .lab-live-row:last-child { border-bottom: none; }
  .lab-live-kind {
    color: var(--text-dim);
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
  }
  .lab-live-title {
    color: var(--text-bright);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .lab-live-meta {
    color: var(--text-dim);
    font-size: .6rem;
    margin-top: .12rem;
  }
  .lab-live-output {
    margin-top: .35rem;
    border-left: 3px solid var(--green);
    background: rgba(34,197,94,.055);
    color: var(--text-bright);
    padding: .45rem .55rem;
    white-space: pre-wrap;
    overflow-wrap: anywhere;
    font-size: .72rem;
    line-height: 1.5;
  }
  .dry-run-row {
    color: var(--amber);
    font-size: .65rem;
    margin-top: .22rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .management-grid {
    display: grid;
    grid-template-columns: minmax(0, 1.25fr) minmax(320px, .75fr);
    gap: 1rem;
    align-items: start;
  }
  .management-section-title {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: .75rem;
    color: var(--text-dim);
    font-family: var(--sans);
    font-size: .64rem;
    font-weight: 600;
    letter-spacing: .14em;
    text-transform: uppercase;
    margin-bottom: .45rem;
  }
  .management-list {
    border-top: 1px solid var(--border);
  }
  .management-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: .65rem;
    padding: .55rem .55rem .55rem .7rem;
    border-bottom: 1px solid var(--border);
    border-left: 3px solid transparent;
  }
  .management-row:hover { background: rgba(255,255,255,.018); }
  .management-row.message-bot {
    border-left-color: var(--green);
    background: linear-gradient(90deg, rgba(34,197,94,.055), transparent 160px);
  }
  .management-row.message-user {
    border-left-color: var(--accent);
    background: linear-gradient(90deg, rgba(61,139,253,.05), transparent 160px);
  }
  .management-row.message-selectable {
    cursor: pointer;
  }
  .management-row.message-selected {
    outline: 1px solid var(--accent);
    outline-offset: -1px;
    background:
      linear-gradient(90deg, rgba(61,139,253,.13), rgba(61,139,253,.035) 220px, transparent),
      var(--surface);
  }
  .management-row.message-bot.message-selected {
    outline-color: var(--green);
    background:
      linear-gradient(90deg, rgba(34,197,94,.15), rgba(34,197,94,.035) 220px, transparent),
      var(--surface);
  }
  .selected-marker {
    color: var(--accent);
    font-size: .58rem;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
  }
  .management-row.message-bot .selected-marker {
    color: var(--green);
  }
  .management-meta {
    display: flex;
    flex-wrap: wrap;
    gap: .35rem .65rem;
    color: var(--text-dim);
    font-size: .62rem;
    margin-bottom: .22rem;
  }
  .management-author { color: var(--accent); }
  .management-row.message-bot .management-author { color: var(--green); }
  .author-type {
    font-size: .58rem;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
  }
  .author-type.bot { color: var(--green); }
  .author-type.user { color: var(--accent); }
  .management-content {
    color: var(--text);
    white-space: pre-wrap;
    overflow-wrap: anywhere;
    font-size: .7rem;
  }
  .management-row-actions {
    display: flex;
    gap: .35rem;
    align-items: start;
  }
  .management-editor {
    grid-column: 1 / 3;
    display: grid;
    gap: .45rem;
    margin-top: -.25rem;
  }
  .management-editor textarea {
    width: 100%;
    min-height: 92px;
    resize: vertical;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-bright);
    font-family: var(--mono);
    font-size: .7rem;
    line-height: 1.5;
    padding: .55rem;
    outline: none;
  }
  .memory-row {
    grid-template-columns: minmax(0, 1fr) auto;
  }
  .memory-row.memory-important {
    border-left-color: var(--amber);
    background: linear-gradient(90deg, rgba(245,158,11,.11), rgba(245,158,11,.028) 220px, transparent);
  }
  .memory-important-badge {
    color: var(--amber);
    border: 1px solid rgba(245,158,11,.55);
    background: var(--amber-dim);
    font-size: .58rem;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    padding: .02rem .28rem;
  }
  .memory-row .management-editor { grid-column: 1 / 3; }
  .memory-controls {
    display: grid;
    grid-template-columns: minmax(120px, 1fr) 90px minmax(145px, 1fr) auto;
    gap: .45rem;
    align-items: center;
  }
  .memory-important-toggle {
    display: inline-flex;
    align-items: center;
    gap: .35rem;
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: .68rem;
    white-space: nowrap;
  }
  .inline-input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: .68rem;
    padding: .35rem .45rem;
    min-width: 0;
  }
  @media (max-width: 900px) {
    .management-toolbar { grid-template-columns: 1fr 1fr; }
    .prompt-lab { grid-template-columns: 1fr; }
    .prompt-lab-run { justify-items: stretch; }
    .management-actions { justify-content: flex-start; flex-wrap: wrap; }
    .management-grid { grid-template-columns: 1fr; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,.7);
    display: flex; align-items: center; justify-content: center;
    padding: 2rem;
  }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    width: 100%; max-width: 1400px;
    max-height: 90vh;
    display: flex; flex-direction: column;
  }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: .5rem .75rem;
    border-bottom: 1px solid var(--border);
    font-size: .7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--text-dim);
    font-family: var(--sans);
  }
  .modal-close {
    background: none; border: none; color: var(--text-dim);
    font-size: 1.2rem; cursor: pointer; padding: 0 .25rem;
  }
  .modal-close:hover { color: var(--text-bright); }
  .modal-body {
    flex: 1; overflow: auto;
    padding: .75rem;
    font-size: .65rem;
    line-height: 1.6;
    color: var(--text);
    word-break: break-word;
    margin: 0;
  }
  .payload-tree {
    font-family: var(--mono);
    white-space: normal;
  }
  .payload-node {
    margin-left: 1rem;
  }
  .payload-row {
    display: grid;
    grid-template-columns: max-content minmax(0, 1fr);
    gap: .45rem;
    align-items: start;
  }
  .payload-key {
    color: var(--accent);
  }
  .payload-primitive {
    color: var(--text);
    white-space: pre-wrap;
    overflow-wrap: anywhere;
  }
  .payload-string {
    color: var(--green);
  }
  .payload-null {
    color: var(--text-dim);
  }
  .payload-collapsible summary {
    color: var(--text-bright);
    cursor: pointer;
    white-space: pre-wrap;
  }
  .payload-collapsible.payload-large > summary {
    color: var(--amber);
  }
  .relationships-shell {
    display: grid;
    grid-template-columns: minmax(300px, 410px) minmax(0, 1fr);
    gap: 1rem;
    max-width: 1440px;
    margin: 0 auto;
  }
  .relationships-panel {
    border-top: 1px solid var(--border);
    padding-top: .75rem;
    min-width: 0;
  }
  .relationships-panel + .relationships-panel { margin-top: 1rem; }
  .relationships-title {
    display: flex; justify-content: space-between; align-items: center;
    font-family: var(--sans);
    font-size: .72rem;
    font-weight: 600;
    color: var(--text-bright);
    text-transform: uppercase;
    letter-spacing: .12em;
    margin-bottom: .65rem;
  }
  .relationships-row {
    display: grid;
    grid-template-columns: 120px minmax(0, 1fr);
    gap: .75rem;
    align-items: center;
    margin-bottom: .5rem;
  }
  .relationships-label {
    color: var(--text-dim);
    font-size: .68rem;
    text-transform: uppercase;
    letter-spacing: .08em;
  }
  .relationships-value {
    color: var(--text);
    min-width: 0;
    overflow-wrap: anywhere;
  }
  .relationships-actions {
    display: flex;
    gap: .45rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .relationships-actions select,
  .relationships-actions input,
  .relationships-row input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: .7rem;
    padding: .35rem .5rem;
    min-width: 0;
  }
  .relationships-main {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(300px, 420px);
    gap: 1rem;
  }
  .relationships-list {
    border: 1px solid var(--border);
    background: var(--surface);
    max-height: 470px;
    overflow: auto;
  }
  .relationships-event {
    padding: .55rem .65rem;
    border-bottom: 1px solid var(--border);
  }
  .relationships-event:last-child { border-bottom: 0; }
  .relationships-event-top {
    display: flex; justify-content: space-between; gap: .75rem;
    font-size: .66rem;
    color: var(--text-dim);
    margin-bottom: .25rem;
  }
  .relationships-event-summary {
    color: var(--text-bright);
    font-size: .72rem;
  }
  .relationships-code {
    white-space: pre-wrap;
    overflow-wrap: anywhere;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: .75rem;
    font-size: .7rem;
    line-height: 1.55;
  }
  .relationships-error { color: var(--red); margin-bottom: .6rem; }
  .management-editor-textarea {
    width: 100%;
    min-height: 76px;
    resize: vertical;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: .7rem;
    line-height: 1.5;
    padding: .55rem;
    margin-bottom: .45rem;
  }
  .management-editor-textarea.raw-json { min-height: 280px; }
  @media (max-width: 980px) {
    .relationships-shell, .relationships-main { grid-template-columns: 1fr; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px }
  ::-webkit-scrollbar-track { background: var(--bg) }
  ::-webkit-scrollbar-thumb { background: var(--border-active); border-radius: 3px }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">Dashboard</div>
  <div class="topbar-sep"></div>
  <div class="tabs">
    <button class="tab-btn active" id="tab-logs">Logs</button>
    <button class="tab-btn" id="tab-management">Management</button>
    <button class="tab-btn" id="tab-relationships">Relationship Lab</button>
  </div>
  <div class="topbar-sep"></div>
  <div class="status-badge" id="status-badge">
    <div class="status-dot"></div>
    <span id="status-text">0 active</span>
  </div>
  <div class="filters" id="log-filters">
    <select id="f-guild"><option value="">All guilds</option></select>
    <select id="f-channel"><option value="">All channels</option></select>
    <select id="f-user"><option value="">All users</option></select>
    <button class="btn" id="btn-refresh">Refresh</button>
  </div>
</div>

<div class="content" id="log-view">
  <div class="log-count" id="log-count"></div>
  <div id="log-list"></div>
</div>

<div class="content" id="management-view" hidden>
  <div class="management-toolbar">
    <select id="m-guild"><option value="">All guilds</option></select>
    <select id="m-channel"><option value="">All channels</option></select>
    <select id="m-scope">
      <option value="">All memory scopes</option>
      <option value="guild">Guild memories</option>
      <option value="user">User memories</option>
      <option value="self">Self memories</option>
    </select>
    <div class="management-actions">
      <label class="discord-delete-toggle" id="m-discord-delete-wrap">
        <input id="m-discord-delete" type="checkbox">
        Also delete in Discord
      </label>
      <button class="btn danger" id="m-delete-selected" disabled>Delete selected</button>
      <span style="color:var(--text-dim);font-size:.65rem">last</span>
      <input class="number-input" id="m-last-count" type="number" min="1" max="20" value="2">
      <button class="btn danger" id="m-delete-last" disabled>Delete</button>
      <button class="btn" id="m-refresh">Refresh</button>
    </div>
  </div>
  <div class="prompt-lab" id="prompt-lab">
    <select id="lab-user"><option value="">Sender</option></select>
    <textarea id="lab-prompt" placeholder="Test prompt as a virtual mention..."></textarea>
    <div class="prompt-lab-run">
      <button class="btn primary" id="lab-run">Run as mention</button>
      <div class="prompt-lab-initiative">
        <button class="btn" data-initiative-kind="self_expression">Draft self-expression</button>
        <button class="btn" data-initiative-kind="targeted_checkin">Draft targeted follow-up</button>
        <label><input type="checkbox" id="lab-initiative-force"> force</label>
      </div>
      <div class="prompt-lab-status" id="lab-status">dry-run writes</div>
    </div>
  </div>
  <div class="prompt-lab-report" id="lab-report"></div>
  <div class="management-grid">
    <section>
      <div class="management-section-title">
        <span>Latest messages</span>
        <span id="m-message-count"></span>
      </div>
      <div class="management-list" id="m-message-list"></div>
    </section>
    <section>
      <div class="management-section-title">
        <span>Memories</span>
        <span id="m-memory-count"></span>
      </div>
      <div class="management-list" id="m-memory-list"></div>
    </section>
  </div>
</div>

<div class="content" id="relationships-view" hidden>
  <div id="relationships-lab-root"></div>
</div>

<div class="modal-overlay" id="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">LLM Request Payload</span>
      <button class="modal-close" id="modal-close">&times;</button>
    </div>
    <div class="modal-body payload-tree" id="modal-body"></div>
  </div>
</div>

<script>
(function(){
  const logList = document.getElementById('log-list');
  const logCount = document.getElementById('log-count');
  const fGuild = document.getElementById('f-guild');
  const fChannel = document.getElementById('f-channel');
  const fUser = document.getElementById('f-user');
  const btnRefresh = document.getElementById('btn-refresh');
  const statusBadge = document.getElementById('status-badge');
  const statusText = document.getElementById('status-text');
  const tabLogs = document.getElementById('tab-logs');
  const tabManagement = document.getElementById('tab-management');
  const tabRelationship = document.getElementById('tab-relationships');
  const logFilters = document.getElementById('log-filters');
  const logView = document.getElementById('log-view');
  const managementView = document.getElementById('management-view');
  const relationshipsView = document.getElementById('relationships-view');
  const mGuild = document.getElementById('m-guild');
  const mChannel = document.getElementById('m-channel');
  const mScope = document.getElementById('m-scope');
  const mRefresh = document.getElementById('m-refresh');
  const mDeleteSelected = document.getElementById('m-delete-selected');
  const mDeleteLast = document.getElementById('m-delete-last');
  const mLastCount = document.getElementById('m-last-count');
  const mDiscordDelete = document.getElementById('m-discord-delete');
  const mDiscordDeleteWrap = document.getElementById('m-discord-delete-wrap');
  const mMessageList = document.getElementById('m-message-list');
  const mMemoryList = document.getElementById('m-memory-list');
  const mMessageCount = document.getElementById('m-message-count');
  const mMemoryCount = document.getElementById('m-memory-count');
  const promptLab = document.getElementById('prompt-lab');
  const labUser = document.getElementById('lab-user');
  const labPrompt = document.getElementById('lab-prompt');
  const labRun = document.getElementById('lab-run');
  const labInitiativeButtons = Array.from(document.querySelectorAll('[data-initiative-kind]'));
  const labInitiativeForce = document.getElementById('lab-initiative-force');
  const labStatus = document.getElementById('lab-status');
  const labReport = document.getElementById('lab-report');
  const managementStateKey = '2b2v.dashboard.management.v1';
  const promptLabSenderStateKey = '2b2v.dashboard.promptLab.sender.v1';
  let activeTab = location.hash === '#management' ? 'management' : location.hash === '#relationships' ? 'relationships' : 'logs';
  let managementDirectory = { guilds: [], channels: [], users: [] };
  let managementMessages = [];
  let managementMemories = [];
  let editingMessageId = null;
  let editingMemoryId = null;
  let renderedManagementMessages = null;
  let renderedManagementMemories = null;
  let renderedManagementGuildOptions = null;
  let renderedManagementChannelOptions = null;
  let renderedPromptLabUserOptions = null;
  let promptLabPollSeq = 0;
  const selectedManagementMessages = new Set();

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function fmtTime(iso) {
    const d = new Date(iso);
    return d.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  function fmtDuration(ms) {
    if (ms < 1000) return ms + 'ms';
    return (ms / 1000).toFixed(1) + 's';
  }

  function fmtDateTime(ms) {
    const d = new Date(ms);
    return d.toLocaleString('en-US', {
      month: '2-digit',
      day: '2-digit',
      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit',
      hour12: false
    });
  }

  function jsStr(s) {
    return JSON.stringify(String(s));
  }

  function fmtCost(calls) {
    let total = 0;
    for (const c of calls) {
      if (c.estimatedCostUsd != null) total += c.estimatedCostUsd;
    }
    if (total === 0) return null;
    return '$' + total.toFixed(4);
  }

  function fmtCache(call) {
    const hasTokens = call.cachedTokens != null || call.cacheWriteTokens != null;
    const hasDiscount = call.cacheDiscountUsd != null;
    if (!hasTokens && !hasDiscount) return '-';
    const parts = [];
    if (hasTokens) {
      const read = call.cachedTokens != null ? call.cachedTokens : 0;
      const write = call.cacheWriteTokens != null ? call.cacheWriteTokens : 0;
      parts.push(read + ' / ' + write);
    }
    if (hasDiscount) parts.push('$' + call.cacheDiscountUsd.toFixed(4));
    return parts.join(' | ');
  }

  function fmtTrigger(t) {
    const kind = triggerKind(t);
    if (kind === 'background_memory_extraction') return 'memory extraction';
    if (kind === 'relationships_extraction') return 'relationships extraction';
    if (kind === 'async_image_generation') return 'async image';
    if (kind === 'prompt_lab') return 'prompt lab';
    if (kind === 'ambient_attention_evaluator') return 'ambient eval';
    if (kind === 'ambient_initiative_evaluator') return 'initiative eval';
    if (kind === 'keyword') return 'keyword';
    return kind;
  }

  function triggerKind(t) {
    if (t == null) return 'none';
    if (typeof t === 'string') return t;
    if (typeof t === 'object') {
      if (typeof t.reason === 'string' && t.reason !== '') return t.reason;
      if (typeof t.type === 'string' && t.type !== '') return t.type;
    }
    return 'custom';
  }

  function triggerDetail(t) {
    if (t == null || typeof t !== 'object') return '';
    if (typeof t.keyword === 'string' && t.keyword !== '') return t.keyword;
    if (typeof t.kind === 'string' && t.kind !== '') {
      return typeof t.status === 'string' && t.status !== '' ? t.kind + ' / ' + t.status : t.kind;
    }
    if (typeof t.mode === 'string' && t.mode !== '') return t.mode;
    if (typeof t.source === 'string' && t.source !== '') return t.source;
    if (typeof t.jobId === 'string' && t.jobId !== '') return shortId(t.jobId);
    return '';
  }

  function triggerClass(t) {
    return 'event-' + triggerKind(t).replace(/_/g, '-').replace(/[^a-zA-Z0-9-]/g, '').toLowerCase();
  }

  function renderEventLabel(t) {
    const detail = triggerDetail(t);
    return '<span class="event-label ' + esc(triggerClass(t)) + '">' + esc(fmtTrigger(t))
      + (detail !== '' ? ' <span class="event-detail">' + esc(detail) + '</span>' : '')
      + '</span>';
  }

  function triggerContextText(ctx) {
    if (ctx == null) return '';
    return ctx.translatedContent || ctx.content || ctx.sourceQuote || '';
  }

  function triggerContextMeta(ctx, entry, includeIds) {
    if (ctx == null) return '';
    const parts = [];
    const guildLabel = ctx.guildName || (entry && entry.guildId) || '';
    const channelLabel = ctx.channelName || (entry && entry.channelId) || '';
    if (guildLabel !== '') parts.push(guildLabel);
    if (channelLabel !== '') parts.push(channelLabel);
    if (ctx.authorUsername) parts.push('@' + ctx.authorUsername);
    if (includeIds === true && ctx.messageId) parts.push('msg ' + shortId(ctx.messageId));
    if (includeIds === true && ctx.sourceMessageId && ctx.sourceMessageId !== ctx.messageId) parts.push('source ' + shortId(ctx.sourceMessageId));
    return parts.join(' | ');
  }

  function triggerLocationText(ctx, entry) {
    const parts = [];
    const guildLabel = ctx && ctx.guildName ? ctx.guildName : (entry && entry.guildId) || '';
    const channelLabel = ctx && ctx.channelName ? '#' + ctx.channelName : (entry && entry.channelId) || '';
    if (guildLabel !== '') parts.push(guildLabel);
    if (channelLabel !== '') parts.push(channelLabel);
    if (ctx && ctx.messageId) parts.push('msg ' + shortId(ctx.messageId));
    if (ctx && ctx.sourceMessageId && ctx.sourceMessageId !== ctx.messageId) parts.push('src ' + shortId(ctx.sourceMessageId));
    return parts.join(' | ');
  }

  function fmtArgs(args) {
    if (args == null) return '';
    const s = JSON.stringify(args);
    return s.length > 120 ? s.slice(0, 120) + '...' : s;
  }

  function fmtStatus(status, isError) {
    if (isError) return 'error';
    return status || 'completed';
  }

  function statusClass(status, isError) {
    return 'status-' + fmtStatus(status, isError);
  }

  function shortId(id) {
    if (id == null || id === '') return '';
    return String(id).length > 12 ? String(id).slice(0, 8) : String(id);
  }

  // Track which entries are expanded by requestId
  const expandedIds = new Set();
  const detailCache = new Map();
  const detailErrors = new Map();
  const detailRequests = new Map();
  const detailRenderedHtml = new Map();
  const rowNodes = new Map();

  function htmlToElement(html) {
    const template = document.createElement('template');
    template.innerHTML = html.trim();
    return template.content.firstElementChild;
  }

  function syncAttributes(current, next) {
    for (const attr of Array.from(current.attributes)) {
      if (!next.hasAttribute(attr.name)) current.removeAttribute(attr.name);
    }
    for (const attr of Array.from(next.attributes)) {
      if (current.getAttribute(attr.name) !== attr.value) current.setAttribute(attr.name, attr.value);
    }
  }

  function patchNode(current, next) {
    if (current.nodeType !== next.nodeType || current.nodeName !== next.nodeName) {
      current.replaceWith(next);
      return next;
    }

    if (current.nodeType === Node.TEXT_NODE) {
      if (current.nodeValue !== next.nodeValue) current.nodeValue = next.nodeValue;
      return current;
    }

    if (current.nodeType !== Node.ELEMENT_NODE) return current;
    syncAttributes(current, next);
    if (current.classList.contains('entry-detail')) return current;

    let currentChild = current.firstChild;
    let nextChild = next.firstChild;
    while (nextChild !== null) {
      const followingNext = nextChild.nextSibling;
      if (currentChild === null) {
        current.appendChild(nextChild.cloneNode(true));
      } else {
        const followingCurrent = currentChild.nextSibling;
        patchNode(currentChild, nextChild);
        currentChild = followingCurrent;
      }
      nextChild = followingNext;
    }
    while (currentChild !== null) {
      const followingCurrent = currentChild.nextSibling;
      current.removeChild(currentChild);
      currentChild = followingCurrent;
    }
    return current;
  }

  function toggleExpand(requestId) {
    if (expandedIds.has(requestId)) {
      expandedIds.delete(requestId);
    } else {
      expandedIds.add(requestId);
    }

    const el = document.querySelector('[data-rid="' + requestId + '"]');
    if (!el) return;
    const expanded = expandedIds.has(requestId);
    el.classList.toggle('expanded', expanded);
    if (expanded) {
      renderDetailState(requestId);
      loadEntryDetail(requestId);
    }
  }

  // Store payloads by key for modal lookup (avoids inline JSON escaping issues)
  const payloadStore = new Map();

  function modalButton(key, title, label, payload) {
    if (payload == null) return '-';
    payloadStore.set(key, payload);
    return '<button class="btn btn-sm payload-btn" data-payload-key="' + esc(key) + '" data-payload-title="' + esc(title) + '">' + esc(label) + '</button>';
  }

  function runtimeActionCount(entry) {
    if (typeof entry.runtimeActionCount === 'number') return entry.runtimeActionCount;
    if (!Array.isArray(entry.tools)) return 0;
    return entry.tools.filter(t => t && t.modelRequestId == null).length;
  }

  function metric(label, value, className) {
    return '<div class="metric"><span class="metric-label">' + esc(label) + '</span><span class="metric-value ' + (className || '') + '">' + esc(value) + '</span></div>';
  }

  function rawPayloadButton(key, title, payload) {
    return payload == null || payload === '' ? '' : modalButton(key, title, 'raw', payload);
  }

  function compactStageText(text) {
    const max = 12000;
    if (text.length <= max) return text;
    return text.slice(0, max);
  }

  function formatStageValue(value, emptyText) {
    if (value == null || value === '') return { text: emptyText || '-', empty: true };
    if (typeof value === 'string') {
      const trimmed = value.trim();
      if (trimmed === '') return { text: emptyText || '-', empty: true };
      try {
        return { text: compactStageText(JSON.stringify(JSON.parse(trimmed), null, 2)), empty: false };
      } catch {}
      return { text: compactStageText(trimmed), empty: false };
    }
    return { text: compactStageText(JSON.stringify(value, null, 2)), empty: false };
  }

  function stageOutput(label, value, emptyText) {
    const formatted = formatStageValue(value, emptyText);
    const rawText = formatted.text;
    const hasMore = !formatted.empty && typeof rawText === 'string' && rawText.length >= 500;
    const head = hasMore ? rawText.slice(0, 500) : rawText;
    const tail = hasMore ? rawText.slice(500) : '';
    return '<div class="stage-output' + (formatted.empty ? ' empty' : '') + '">'
      + '<span class="stage-output-label">' + esc(label) + '</span>'
      + esc(head)
      + (hasMore ? '<details class="stage-more"><summary>show more</summary><span>' + esc(tail) + '</span></details>' : '')
      + '</div>';
  }

  function modelResponseText(call) {
    if (call.outputText != null && String(call.outputText).trim() !== '') return call.outputText;
    const payload = call.responsePayload;
    if (payload == null || typeof payload !== 'object') return '';
    if (typeof payload.content === 'string') return payload.content;
    if (Array.isArray(payload.content)) {
      return payload.content
        .filter(part => part && typeof part === 'object' && typeof part.text === 'string')
        .map(part => part.text)
        .join('\n');
    }
    if (typeof payload.output_text === 'string') return payload.output_text;
    const choice = Array.isArray(payload.choices) ? payload.choices[0] : null;
    const message = choice && typeof choice === 'object' ? choice.message : null;
    if (message && typeof message.content === 'string') return message.content;
    if (message && Array.isArray(message.content)) {
      return message.content
        .filter(part => part && typeof part === 'object' && typeof part.text === 'string')
        .map(part => part.text)
        .join('\n');
    }
    return '';
  }

  function toolResultPayload(tool, fallback) {
    if (tool && tool.resultPayload != null) return tool.resultPayload;
    if (tool && tool.result != null) return tool.result;
    return fallback || '';
  }

  function renderToolOutputPayload(payload) {
    if (payload == null || payload === '') return '';
    if (typeof payload !== 'object') return payload;
    const parts = [];
    if (Array.isArray(payload.content)) {
      const contentText = payload.content
        .filter(part => part && typeof part === 'object' && typeof part.text === 'string')
        .map(part => part.text)
        .join('\n');
      if (contentText !== '') parts.push(contentText);
    }
    if (payload.details != null) parts.push(JSON.stringify(payload.details, null, 2));
    if (parts.length > 0) return parts.join('\n');
    return payload;
  }

  function renderStageTool(row, requestId, parentKey) {
    const t = row.execution;
    const emittedCall = row.emitted;
    const toolId = (emittedCall && emittedCall.id) || (t && t.id) || parentKey;
    const name = (emittedCall && emittedCall.name) || (t && t.tool) || 'tool';
    const rawStatus = t ? t.status : (emittedCall && emittedCall.status);
    const status = fmtStatus(rawStatus, t && t.isError);
    const args = t && t.args ? t.args : (emittedCall ? emittedCall.args : {});
    const resultPayload = toolResultPayload(t, emittedCall && emittedCall.skippedReason);
    const renderedResult = renderToolOutputPayload(resultPayload);
    const baseKey = 'tool:' + requestId + ':' + toolId + ':' + parentKey;
    return '<div class="stage-tool' + (status === 'error' ? ' tool-error' : '') + '">'
      + '<div>'
        + '<div class="stage-tool-name">' + esc(name) + '</div>'
        + '<div class="stage-tool-meta">' + esc(shortId(toolId)) + ' · <span class="' + esc(statusClass(status, false)) + '">' + esc(status) + '</span> · ' + esc(t && t.durationMs != null ? fmtDuration(t.durationMs) : '-') + '</div>'
      + '</div>'
      + '<div>' + stageOutput('args', args, 'no args') + '<div class="payload-actions">' + rawPayloadButton(baseKey + ':args', 'Tool Args', args) + '</div></div>'
      + '<div>' + stageOutput('result', renderedResult, status === 'running' || status === 'queued' ? 'pending' : 'no result') + '<div class="payload-actions">' + rawPayloadButton(baseKey + ':result', 'Tool Result', resultPayload) + '</div></div>'
      + '</div>';
  }

  function renderToolGroup(title, rows, requestId, parentKey) {
    if (rows.length === 0) return '';
    return '<div><div class="stage-subtitle">' + esc(title) + '</div><div class="stage-tool-list">'
      + rows.map((row, index) => renderStageTool(row, requestId, parentKey + ':' + index)).join('')
      + '</div></div>';
  }

  function renderToolsForModel(modelCall, toolsById, requestId, modelKey) {
    const emitted = modelCall.emittedToolCalls || [];
    if (emitted.length === 0) return '';

    const rows = [];
    for (const emittedCall of emitted) {
      rows.push({ emitted: emittedCall, execution: toolsById.get(emittedCall.id) });
    }

    return renderToolGroup('Tools emitted by this model request', rows, requestId, modelKey + ':emitted');
  }

  function renderActionsAfterModel(tools, requestId, modelKey) {
    const rows = tools.map(tool => ({ execution: tool, emitted: null }));
    return renderToolGroup('Outputs/actions after this model', rows, requestId, modelKey + ':after');
  }

  function stageTime(value) {
    const parsed = Date.parse(value || '');
    return Number.isFinite(parsed) ? parsed : Number.MAX_SAFE_INTEGER;
  }

  function renderInputStage(e) {
    const contextText = triggerContextText(e.triggerContext);
    const contextMeta = triggerContextMeta(e.triggerContext, e, true);
    return '<div class="stage-block stage-input">'
      + '<div class="stage-head"><div><div class="stage-title-row"><span class="stage-kind">Input</span><span class="stage-title">Trigger context</span></div><div class="stage-meta">' + esc(contextMeta || 'no location metadata') + '</div></div>' + renderEventLabel(e.trigger) + '</div>'
      + '<div class="stage-body">' + stageOutput('message', contextText, 'no trigger text') + '</div>'
      + '</div>';
  }

  function renderErrorStage(errorText) {
    return '<div class="stage-block stage-error">'
      + '<div class="stage-head"><div><div class="stage-title-row"><span class="stage-kind">Failure</span><span class="stage-title">Request error</span></div></div></div>'
      + '<div class="stage-body">' + stageOutput('error', errorText, 'error unavailable') + '</div>'
      + '</div>';
  }

  function renderModelStage(e, call, index, toolsById, attachedTools) {
    const status = fmtStatus(call.status, call.isError);
    const cost = call.estimatedCostUsd != null ? '$' + call.estimatedCostUsd.toFixed(4) : '-';
    const duration = call.durationMs != null ? fmtDuration(call.durationMs) : (status === 'running' ? 'running' : '-');
    const output = modelResponseText(call);
    const modelKey = (call.id || ('model-' + index));
    const isEvaluator = triggerKind(e.trigger) === 'ambient_attention_evaluator';
    return '<div class="stage-block ' + (isEvaluator ? 'stage-evaluator' : 'stage-model') + '">'
      + '<div class="stage-head">'
        + '<div><div class="stage-title-row"><span class="stage-kind">' + (isEvaluator ? 'Evaluator' : 'Model') + '</span><span class="stage-title">#' + (index + 1) + ' <span class="' + esc(statusClass(status, false)) + '">' + esc(status) + '</span></span></div><div class="stage-meta">' + esc(call.model) + ' · stop ' + esc(call.stopReason) + ' · ' + esc(call.contentTypes.join(', ') || 'no content yet') + '</div></div>'
        + '<div><div class="metric-grid">'
          + metric('duration', duration)
          + metric('tokens', call.promptTokens + ' / ' + call.completionTokens)
          + metric('cache', fmtCache(call))
          + metric('cost', cost, 'entry-cost')
        + '</div><div class="stage-actions">'
          + rawPayloadButton('model:req:' + e.requestId + ':' + modelKey, 'Model Request', call.requestPayload)
          + rawPayloadButton('model:res:' + e.requestId + ':' + modelKey, 'Model Response', call.responsePayload)
        + '</div></div>'
      + '</div>'
      + '<div class="stage-body">'
        + (call.error != null ? stageOutput('error', call.error, 'error unavailable') : '')
        + stageOutput('response', output, status === 'running' ? 'waiting for response' : 'no response text captured')
        + renderToolsForModel(call, toolsById, e.requestId, modelKey)
        + renderActionsAfterModel(attachedTools || [], e.requestId, modelKey)
      + '</div>'
      + '</div>';
  }

  function renderRuntimeStage(e, tool, index) {
    const status = fmtStatus(tool.status, tool.isError);
    const duration = tool.durationMs != null ? fmtDuration(tool.durationMs) : (status === 'running' ? 'running' : '-');
    const resultPayload = toolResultPayload(tool, '');
    const renderedResult = renderToolOutputPayload(resultPayload);
    const runtimeKey = (tool.id || tool.tool || 'runtime') + ':' + index;
    return '<div class="stage-block stage-runtime">'
      + '<div class="stage-head">'
        + '<div><div class="stage-title-row"><span class="stage-kind">Runtime</span><span class="stage-title">' + esc(tool.tool || 'runtime action') + ' <span class="' + esc(statusClass(status, false)) + '">' + esc(status) + '</span></span></div><div class="stage-meta">' + esc(tool.id != null ? shortId(tool.id) : 'handler-owned') + ' · ' + esc(duration) + '</div></div>'
        + '<div class="stage-actions">'
          + rawPayloadButton('runtime:args:' + e.requestId + ':' + runtimeKey, 'Runtime Args', tool.args)
          + rawPayloadButton('runtime:result:' + e.requestId + ':' + runtimeKey, 'Runtime Result', resultPayload)
        + '</div>'
      + '</div>'
      + '<div class="stage-body">'
        + stageOutput('args', tool.args, 'no args')
        + stageOutput('result', renderedResult, status === 'running' ? 'pending' : 'no result')
      + '</div>'
      + '</div>';
  }

  function renderEntryDetail(e) {
    const toolsById = new Map();
    for (const t of e.tools || []) {
      if (t.id) toolsById.set(t.id, t);
    }

    const modelCalls = e.llmCalls || [];
    const runtimeTools = (e.tools || []).filter(t => !t.modelRequestId);
    const runtimeToolsByModelIndex = new Map();
    const standaloneRuntimeTools = [];
    for (const tool of runtimeTools) {
      if (modelCalls.length === 0) {
        standaloneRuntimeTools.push(tool);
        continue;
      }
      const toolAt = stageTime(tool.startedAt || tool.completedAt);
      let targetIndex = -1;
      for (let i = 0; i < modelCalls.length; i++) {
        const modelAt = stageTime(modelCalls[i].startedAt || modelCalls[i].completedAt);
        if (modelAt <= toolAt) targetIndex = i;
      }
      if (targetIndex < 0) targetIndex = modelCalls.length - 1;
      const existing = runtimeToolsByModelIndex.get(targetIndex) || [];
      existing.push(tool);
      runtimeToolsByModelIndex.set(targetIndex, existing);
    }

    const timeline = [];
    for (let li = 0; li < modelCalls.length; li++) {
      const call = modelCalls[li];
      timeline.push({
        at: stageTime(call.startedAt || call.completedAt),
        html: renderModelStage(e, call, li, toolsById, runtimeToolsByModelIndex.get(li) || [])
      });
    }
    for (let i = 0; i < standaloneRuntimeTools.length; i++) {
      const tool = standaloneRuntimeTools[i];
      timeline.push({
        at: stageTime(tool.startedAt || tool.completedAt),
        html: renderRuntimeStage(e, tool, i)
      });
    }
    timeline.sort((a, b) => a.at - b.at);

    return '<div class="detail-flow">'
      + renderInputStage(e)
      + (e.error != null ? renderErrorStage(e.error) : '')
      + timeline.map(item => item.html).join('')
      + (e.error == null && e.tools.length === 0 && e.llmCalls.length === 0 ? '<div class="detail-state">No tool or LLM detail for this entry.</div>' : '')
      + '</div>';
  }

  function detailStateHtml(requestId) {
    const cached = detailCache.get(requestId);
    if (cached != null) return renderEntryDetail(cached);
    const error = detailErrors.get(requestId);
    if (error != null) return '<div class="detail-state error">' + esc(error) + '</div>';
    return '<div class="detail-state">Loading entry details...</div>';
  }

  function renderDetailState(requestId) {
    const detail = document.querySelector('[data-detail-rid="' + requestId + '"]');
    if (detail == null) return;
    const html = detailStateHtml(requestId);
    if (detailRenderedHtml.get(requestId) === html) return;
    const openDetails = new Set();
    Array.from(detail.querySelectorAll('details')).forEach((node, index) => {
      if (node.open) openDetails.add(index);
    });
    const next = htmlToElement(html);
    if (next == null) {
      detail.replaceChildren();
    } else if (detail.firstElementChild == null) {
      detail.replaceChildren(next);
    } else {
      patchNode(detail.firstElementChild, next);
      let extra = detail.firstElementChild.nextElementSibling;
      while (extra != null) {
        const following = extra.nextElementSibling;
        extra.remove();
        extra = following;
      }
    }
    Array.from(detail.querySelectorAll('details')).forEach((node, index) => {
      if (openDetails.has(index)) node.open = true;
    });
    detailRenderedHtml.set(requestId, html);
  }

  async function loadEntryDetail(requestId) {
    const cached = detailCache.get(requestId);
    if (cached != null && cached.status !== 'active') return;
    if (detailRequests.has(requestId)) return;
    detailErrors.delete(requestId);
    const request = (async function() {
      const r = await fetch('/api/logs/' + encodeURIComponent(requestId));
      if (r.status === 401) { location.href = '/login'; return; }
      if (!r.ok) throw new Error('Unable to load entry details (' + r.status + ')');
      detailCache.set(requestId, await r.json());
    })();
    detailRequests.set(requestId, request);
    try {
      await request;
    } catch (err) {
      detailErrors.set(requestId, err instanceof Error ? err.message : 'Unable to load entry details');
    } finally {
      detailRequests.delete(requestId);
      if (expandedIds.has(requestId)) renderDetailState(requestId);
    }
  }

  function renderEntry(e) {
    const cost = e.estimatedCostUsd != null ? '$' + e.estimatedCostUsd.toFixed(4) : null;
    const hasErr = e.hasError === true;
    const isActive = e.status === 'active';
    const cls = ['entry'];
    if (hasErr) cls.push('has-error');
    if (isActive) cls.push('active');
    if (!e.agentRan && !isActive) cls.push('no-agent');
    if (expandedIds.has(e.requestId)) cls.push('expanded');

    const rid = esc(e.requestId);
    const contextText = triggerContextText(e.triggerContext);
    const locationText = triggerLocationText(e.triggerContext, e);
    return '<div class="' + cls.join(' ') + '" data-rid="' + rid + '">'
      + '<div class="entry-header" onclick="window.__toggleExpand(\'' + rid + '\')">'
        + '<span class="entry-time">' + fmtTime(e.timestamp) + '</span>'
        + renderEventLabel(e.trigger)
        + '<span class="entry-user">' + esc(e.authorUsername) + '</span>'
        + '<span class="entry-location">' + esc(locationText) + '</span>'
        + '<span class="entry-message">' + (contextText !== '' ? esc(contextText) : '<span style="color:var(--text-dim);font-style:italic">no trigger text</span>') + '</span>'
        + '<div class="entry-stats">'
          + (isActive ? '<span class="entry-status">running</span>' : '')
          + (hasErr ? '<span class="entry-error-badge">error</span>' : '')
          + '<span>' + fmtDuration(e.totalDurationMs) + '</span>'
          + '<span>A:<span class="stat-val">' + runtimeActionCount(e) + '</span></span>'
          + '<span>T:<span class="stat-val">' + e.toolCount + '</span></span>'
          + '<span>L:<span class="stat-val">' + e.llmCallCount + '</span></span>'
          + (cost ? '<span class="entry-cost">' + cost + '</span>' : '')
        + '</div>'
      + '</div>'
      + '<div class="entry-detail" data-detail-rid="' + rid + '">' + (expandedIds.has(e.requestId) ? detailStateHtml(e.requestId) : '') + '</div>'
    + '</div>';
  }
  // Expose toggle for inline onclick
  window.__toggleExpand = toggleExpand;

  function currentLogParams() {
    const params = new URLSearchParams();
    if (fGuild.value) params.set('guildId', fGuild.value);
    if (fChannel.value) params.set('channelId', fChannel.value);
    if (fUser.value) params.set('authorUsername', fUser.value);
    return params;
  }

  async function fetchLogs() {
    const requestQuery = currentLogParams().toString();
    const r = await fetch('/api/logs?' + requestQuery);
    if (r.status === 401) { location.href = '/login'; return; }
    const data = await r.json();
    if (currentLogParams().toString() !== requestQuery) return;

    logCount.textContent = data.length + ' entries';
    if (data.length === 0) {
      rowNodes.clear();
      detailRenderedHtml.clear();
      if (logList.children.length !== 1 || !logList.firstElementChild.classList.contains('empty-state')) {
        logList.replaceChildren(htmlToElement('<div class="empty-state">No log entries yet. Trigger some bot messages.</div>'));
      }
    } else {
      const emptyState = logList.querySelector('.empty-state');
      if (emptyState != null) emptyState.remove();
      const seen = new Set();
      let cursor = logList.firstElementChild;
      for (const entry of data) {
        seen.add(entry.requestId);
        const next = htmlToElement(renderEntry(entry));
        const existing = rowNodes.get(entry.requestId);
        const node = existing == null ? next : patchNode(existing, next);
        rowNodes.set(entry.requestId, node);
        if (node !== cursor) logList.insertBefore(node, cursor);
        cursor = node.nextElementSibling;
      }
      for (const [requestId, node] of Array.from(rowNodes.entries())) {
        if (seen.has(requestId)) continue;
        rowNodes.delete(requestId);
        detailRenderedHtml.delete(requestId);
        node.remove();
      }
    }
  }

  async function fetchFilters() {
    const r = await fetch('/api/filters');
    if (r.status === 401) { location.href = '/login'; return; }
    const f = await r.json();
    const gv = fGuild.value, cv = fChannel.value, uv = fUser.value;
    fGuild.innerHTML = '<option value="">All guilds</option>' + f.guildIds.map(id => '<option value="'+esc(id)+'">'+esc(id)+'</option>').join('');
    fChannel.innerHTML = '<option value="">All channels</option>' + f.channelIds.map(id => '<option value="'+esc(id)+'">'+esc(id)+'</option>').join('');
    fUser.innerHTML = '<option value="">All users</option>' + f.usernames.map(u => '<option value="'+esc(u)+'">'+esc(u)+'</option>').join('');
    fGuild.value = gv; fChannel.value = cv; fUser.value = uv;
  }

  function loadManagementState() {
    try {
      const raw = localStorage.getItem(managementStateKey);
      if (raw == null) return;
      const state = JSON.parse(raw);
      if (typeof state.guildId === 'string') mGuild.value = state.guildId;
      if (typeof state.channelId === 'string') mChannel.value = state.channelId;
      if (typeof state.scope === 'string') mScope.value = state.scope;
      if (typeof state.lastCount === 'number') mLastCount.value = String(state.lastCount);
      if (typeof state.deleteDiscord === 'boolean') mDiscordDelete.checked = state.deleteDiscord;
      syncDiscordDeleteToggle();
    } catch {}
  }

  function saveManagementState() {
    localStorage.setItem(managementStateKey, JSON.stringify({
      guildId: mGuild.value,
      channelId: mChannel.value,
      scope: mScope.value,
      lastCount: Number(mLastCount.value) || 2,
      deleteDiscord: mDiscordDelete.checked === true
    }));
  }

  function promptLabSenderKey() {
    return mGuild.value + ':' + mChannel.value;
  }

  function loadPromptLabSender() {
    try {
      const raw = localStorage.getItem(promptLabSenderStateKey);
      if (raw == null) return '';
      const state = JSON.parse(raw);
      const key = promptLabSenderKey();
      return typeof state[key] === 'string' ? state[key] : '';
    } catch {
      return '';
    }
  }

  function savePromptLabSender() {
    try {
      const raw = localStorage.getItem(promptLabSenderStateKey);
      const state = raw == null ? {} : JSON.parse(raw);
      state[promptLabSenderKey()] = labUser.value;
      localStorage.setItem(promptLabSenderStateKey, JSON.stringify(state));
    } catch {}
  }

  function syncDiscordDeleteToggle() {
    mDiscordDeleteWrap.classList.toggle('active', mDiscordDelete.checked === true);
  }

  function discordDeleteEnabled() {
    return mDiscordDelete.checked === true;
  }

  function managementSelectFocused() {
    return document.activeElement instanceof HTMLSelectElement
      && managementView.contains(document.activeElement);
  }

  function setTab(tab) {
    activeTab = tab;
    tabLogs.classList.toggle('active', tab === 'logs');
    tabManagement.classList.toggle('active', tab === 'management');
    tabRelationship.classList.toggle('active', tab === 'relationships');
    logView.hidden = tab !== 'logs';
    managementView.hidden = tab !== 'management';
    relationshipsView.hidden = tab !== 'relationships';
    logFilters.style.display = tab === 'logs' ? 'flex' : 'none';
    location.hash = tab === 'management' ? 'management' : tab === 'relationships' ? 'relationships' : 'logs';
    if (tab === 'management') {
      refreshManagement();
      if (logPollingActive && managementPollTimer === null) pollManagement();
    } else if (managementPollTimer !== null) {
      clearTimeout(managementPollTimer);
      managementPollTimer = null;
    }
  }

  function optionHtml(value, label, extra) {
    return '<option value="' + esc(value) + '"' + (extra || '') + '>' + esc(label) + '</option>';
  }

  function labelForGuild(id) {
    const hit = managementDirectory.guilds.find(g => g.id === id);
    return hit ? hit.name : id;
  }

  function labelForChannel(id) {
    const hit = managementDirectory.channels.find(c => c.id === id);
    return hit ? '#' + hit.name : id;
  }

  function syncManagementDeleteButtons() {
    const hasExactChannel = mGuild.value !== '' && mChannel.value !== '';
    mDeleteLast.disabled = !hasExactChannel;
    mDeleteSelected.disabled = selectedManagementMessages.size === 0;
    mDeleteSelected.textContent = selectedManagementMessages.size === 0
      ? 'Delete selected'
      : 'Delete selected (' + selectedManagementMessages.size + ')';
    promptLab.classList.toggle('active', hasExactChannel);
    labRun.disabled = !hasExactChannel || labUser.value === '' || labPrompt.value.trim() === '';
    labInitiativeButtons.forEach(btn => { btn.disabled = !hasExactChannel; });
  }

  function renderPromptLabUsers() {
    const saved = loadPromptLabSender();
    const userMap = new Map();
    for (const message of managementMessages) {
      if (message.userId === '') continue;
      userMap.set(message.userId, message.authorDisplayName || message.authorUsername || message.userId);
    }
    for (const user of managementDirectory.users) {
      if (!userMap.has(user.id)) userMap.set(user.id, user.name);
    }
    const options = [...userMap.entries()]
      .sort((a, b) => String(a[1]).localeCompare(String(b[1])) || String(a[0]).localeCompare(String(b[0])));
    const optionsHtml = '<option value="">Sender</option>'
      + options.map(([id, name]) => optionHtml(id, '@' + name)).join('');
    if (renderedPromptLabUserOptions !== optionsHtml) {
      labUser.innerHTML = optionsHtml;
      renderedPromptLabUserOptions = optionsHtml;
    }
    if (saved !== '' && userMap.has(saved)) {
      labUser.value = saved;
    } else if (labUser.value === '' && options.length > 0) {
      labUser.value = options[0][0];
    }
    syncManagementDeleteButtons();
  }

  function labStatusText(status, isError) {
    if (isError) return 'error';
    return status || 'completed';
  }

  function renderPromptLabLive(detail) {
    if (detail == null) return '';
    const llmRows = (detail.llmCalls || []).map((call, index) => {
      const status = labStatusText(call.status, call.isError);
      const cost = call.estimatedCostUsd != null ? ' · $' + Number(call.estimatedCostUsd).toFixed(4) : '';
      const duration = call.durationMs != null ? fmtDuration(call.durationMs) : status;
      const output = modelResponseText(call);
      return '<div class="lab-live-row">'
        + '<div class="lab-live-kind">Model</div>'
        + '<div><div class="lab-live-title">#' + (index + 1) + ' ' + esc(call.model || 'model') + '</div>'
          + '<div class="lab-live-meta">tokens ' + esc(String(call.promptTokens || 0)) + ' / ' + esc(String(call.completionTokens || 0)) + cost + '</div>'
          + (output !== '' ? '<div class="lab-live-output">' + esc(output) + '</div>' : '')
        + '</div>'
        + '<div class="' + esc(statusClass(status, false)) + '">' + esc(duration) + '</div>'
      + '</div>';
    }).join('');
    const toolRows = (detail.tools || []).map((tool) => {
      const status = labStatusText(tool.status, tool.isError);
      const dry = tool.result && String(tool.result).includes('Prompt Lab dry-run') ? ' · dry-run' : '';
      const duration = tool.durationMs != null ? fmtDuration(tool.durationMs) : status;
      return '<div class="lab-live-row">'
        + '<div class="lab-live-kind">Tool</div>'
        + '<div><div class="lab-live-title">' + esc(tool.tool || 'tool') + dry + '</div>'
          + '<div class="lab-live-meta">' + esc(fmtArgs(tool.args || {})) + '</div></div>'
        + '<div class="' + esc(statusClass(status, false)) + '">' + esc(duration) + '</div>'
      + '</div>';
    }).join('');
    if (llmRows === '' && toolRows === '') {
      return '<div class="lab-live"><div class="detail-state">Waiting for model request...</div></div>';
    }
    return '<div class="lab-live"><div class="detail-label">Live request</div>' + llmRows + toolRows + '</div>';
  }

  function renderPromptLabRelationship(result) {
    const extraction = result && result.relationshipsExtraction;
    if (!extraction) return '';
    const signals = extraction.signals || [];
    const rejected = extraction.rejected || [];
    const rows = signals.length > 0
      ? signals.map(s => '<div class="dry-run-row">' + esc(s.summary || '') + '</div>').join('')
      : '<div class="detail-state">No relationship signals.</div>';
    return '<div class="detail-label" style="margin-top:.7rem">Relationship extraction dry-run</div>'
      + '<div class="prompt-lab-summary"><span>signals:<span class="stat-val">' + esc(String(signals.length)) + '</span></span>'
      + '<span>accepted:<span class="stat-val">' + esc(String((extraction.accepted || []).length)) + '</span></span>'
      + '<span>rejected:<span class="stat-val">' + esc(String(rejected.length)) + '</span></span></div>'
      + rows;
  }

  function renderPromptLabRelationshipContext(result) {
    const context = result && result.relationshipsContext;
    if (!context) return '';
    return '<div class="detail-label" style="margin-top:.7rem">Relationship prompt context</div>'
      + '<div class="lab-live-output">' + esc(context) + '</div>';
  }

  function renderPromptLabMemory(result, dryRuns) {
    const memory = result && result.memoryExtraction;
    if (!memory) return '';
    const writes = dryRuns.filter(d => d.tool === 'record_memory');
    const body = memory.error
      ? '<div class="detail-state error">' + esc(memory.error) + '</div>'
      : writes.length > 0
        ? writes.map(d => '<div class="dry-run-row">' + esc(JSON.stringify(d.args)) + '</div>').join('')
        : '<div class="detail-state">' + (memory.ran ? 'No memory updates proposed.' : memory.enabled ? 'Memory extraction skipped: no draft reply.' : 'Memory extraction disabled.') + '</div>';
    return '<div class="detail-label" style="margin-top:.7rem">Memory extraction dry-run</div>' + body;
  }

  function renderPromptLabReport(result, detail) {
    if (result == null) {
      labReport.classList.remove('active');
      labReport.innerHTML = '';
      return;
    }
    const cost = result.estimatedCostUsd != null ? '$' + Number(result.estimatedCostUsd).toFixed(4) : '-';
    const drafts = result.drafts || [];
    const dryRuns = result.dryRuns || [];
    labReport.classList.add('active');
    const isRunning = result.running === true || (detail && detail.status === 'active');
    labReport.innerHTML = '<div class="management-section-title"><span>' + (isRunning ? 'Prompt Lab Running' : 'Prompt Lab Run') + '</span><span>' + esc(shortId(result.requestId)) + '</span></div>'
      + '<div class="prompt-lab-summary">'
        + '<span>' + esc(fmtDuration(result.totalDurationMs || 0)) + '</span>'
        + '<span>L:<span class="stat-val">' + esc(String(result.llmCallCount || 0)) + '</span></span>'
        + '<span>A:<span class="stat-val">' + esc(String(result.runtimeActionCount || 0)) + '</span></span>'
        + '<span>T:<span class="stat-val">' + esc(String(result.toolCount || 0)) + '</span></span>'
        + '<span>dry:<span class="stat-val">' + esc(String(dryRuns.length)) + '</span></span>'
        + '<span class="entry-cost">' + esc(cost) + '</span>'
        + (result.error ? '<span class="tool-error">' + esc(result.error) + '</span>' : '')
      + '</div>'
      + (drafts.length > 0
        ? '<div class="detail-label">Draft replies</div>' + drafts.map(d => '<div class="draft-message">' + esc(d.text || '') + '</div>').join('')
        : '<div class="detail-state">' + (isRunning ? 'Draft reply pending...' : 'No draft reply was produced.') + '</div>')
      + (dryRuns.length > 0
        ? '<div class="detail-label" style="margin-top:.7rem">Dry-run writes</div>' + dryRuns.map(d => '<div class="dry-run-row">' + esc(d.tool) + ' ' + esc(JSON.stringify(d.args)) + '</div>').join('')
        : '')
      + renderPromptLabRelationshipContext(result)
      + renderPromptLabRelationship(result)
      + renderPromptLabMemory(result, dryRuns)
      + renderPromptLabLive(detail);
  }

  async function fetchManagementDirectory(forceDomUpdate) {
    const r = await fetch('/api/management/directory');
    if (r.status === 401) { location.href = '/login'; return; }
    if (!r.ok) throw new Error('Unable to load management directory');
    const directory = await r.json();
    if (forceDomUpdate !== true && managementSelectFocused()) return false;
    managementDirectory = directory;
    const gv = mGuild.value, cv = mChannel.value;
    const guildOptionsHtml = '<option value="">All guilds</option>'
      + managementDirectory.guilds.map(g => optionHtml(g.id, g.name)).join('');
    if (renderedManagementGuildOptions !== guildOptionsHtml) {
      mGuild.innerHTML = guildOptionsHtml;
      renderedManagementGuildOptions = guildOptionsHtml;
    }
    const visibleChannels = managementDirectory.channels
      .filter(c => gv === '' || c.guildId === gv)
      .sort((a, b) => a.name.localeCompare(b.name) || a.id.localeCompare(b.id));
    const channelOptionsHtml = '<option value="">All channels</option>'
      + visibleChannels.map(c => optionHtml(c.id, '#' + c.name + ' · ' + labelForGuild(c.guildId), ' data-guild-id="' + esc(c.guildId) + '"')).join('');
    if (renderedManagementChannelOptions !== channelOptionsHtml) {
      mChannel.innerHTML = channelOptionsHtml;
      renderedManagementChannelOptions = channelOptionsHtml;
    }
    mGuild.value = gv;
    if (visibleChannels.some(c => c.id === cv)) mChannel.value = cv; else mChannel.value = '';
    syncManagementDeleteButtons();
    return true;
  }

          + '<span>conf ' + esc(Number(memory.confidence).toFixed(2)) + '</span>'
          + (important ? '<span class="memory-important-badge">important</span>' : '')
          + (memory.expiresAt != null ? '<span>expires ' + esc(fmtDateTime(memory.expiresAt)) + '</span>' : '')
        + '</div>'
        + '<div class="management-content">' + esc(memory.content) + '</div>'
      + '</div>'
      + '<div class="management-row-actions">'
        + '<button class="btn btn-sm" onclick="window.__editManagementMemory(' + memory.id + ')">Edit</button>'

  function renderManagement() {
    const messageCount = managementMessages.length + ' rows';
    const memoryCount = managementMemories.length + ' rows';
    const messageHtml = managementMessages.length === 0
      ? '<div class="empty-state">No stored messages match these filters.</div>'
      : managementMessages.map(renderManagementMessage).join('');
    const memoryHtml = managementMemories.length === 0
      ? '<div class="empty-state">No memories match these filters.</div>'
      : managementMemories.map(renderManagementMemory).join('');

    if (mMessageCount.textContent !== messageCount) mMessageCount.textContent = messageCount;
    if (mMemoryCount.textContent !== memoryCount) mMemoryCount.textContent = memoryCount;
    if (renderedManagementMessages !== messageHtml) {
      mMessageList.innerHTML = messageHtml;
      renderedManagementMessages = messageHtml;
    }
    if (renderedManagementMemories !== memoryHtml) {
      mMemoryList.innerHTML = memoryHtml;
      renderedManagementMemories = memoryHtml;
    }
    syncManagementDeleteButtons();
