# Delamain instance configuration.
# Start with PROFILE=delamain and a separate environment/token.
dataDir: data/delamain

llmProvider: openai-codex
model: gpt-5.6-sol
thinkingLevel: medium
codexTransport: websocket-cached
timezone: Europe/Moscow

relationships:
  enabled: false
  promptInjection: false

memoryExtraction:
  postReply: true
  maxToolCalls: 3
  ambient:
    enabled: false

ambientAttention:
  enabled: false

promptTransport:
    openaiCodex:
        mode: split-input # (send stable sections as separate cacheable input messages)
        sections:
            system: { role: developer, target: instructions } # (top-level system/developer instruction bucket)
            core: { role: developer, target: input, cacheGroup: core } # (stable persona/style prompt)
            skills: { role: developer, target: input, cacheGroup: skills } # (stable available-skill index)
            runtime: { role: developer, target: input, cacheGroup: runtime } # (stable runtime behavior policy)
            stableContext: {
                    role: developer,
                    target: input,
                    cacheGroup: stable-context,
                } # (less volatile contextual prefix)
            olderHistory: { role: user, target: input, cacheGroup: older-history } # (cached older chat history)
            serverMembers: { role: user, target: input, cacheGroup: members } # (visible member/display-name context)
            threadsInChannel: { role: user, target: input, cacheGroup: threads } # (thread list/metadata context)
            discordContext: { role: user, target: input, cacheGroup: context } # (current guild/channel navigation context)
            upcomingSchedules: { role: user, target: input, cacheGroup: shcedules } # (pending schedule summary)
            memories: { role: user, target: input, cacheGroup: memories } # (selected memory context)
            recentHistory: { role: user, target: input, cacheGroup: recent } # (uncached recent chat history)
            currentContext: {
                    role: user,
                    target: input,
                    cacheGroup: current-context,
                } # (time/contact/current-turn metadata)
            personaMode: { role: developer, target: input } # (volatile active persona mode overlay)
            responseInstruction: {
                    role: developer,
                    target: input,
                    cacheGroup: response-instruction,
                } # (reply-loop behavior instruction)
            currentTurn: { role: user, target: input, cacheGroup: current-turn } # (new Discord event text)
            finalActionInstruction: {
                    role: developer,
                    target: input,
                    cacheGroup: final-action,
                } # (last instruction before action)
    openrouter:
        sections:
            system: { role: developer, target: input, cacheGroup: core } # (system prompt section in OpenRouter messages)
            core: { role: developer, target: input, cacheGroup: core } # (stable persona/style prompt)
            skills: { role: developer, target: input, cacheGroup: runtime } # (stable available-skill index)
            runtime: { role: developer, target: input, cacheGroup: runtime } # (stable runtime behavior policy)
            stableContext: {
                    role: user,
                    target: input,
                    cacheGroup: stable-context,
                } # (less volatile contextual prefix)
            olderHistory: { role: user, target: input, cacheGroup: older-history } # (cached older chat history)
            serverMembers: { role: user, target: input } # (visible member/display-name context)
            threadsInChannel: { role: user, target: input } # (thread list/metadata context)
            discordContext: { role: user, target: input } # (current guild/channel navigation context)
            upcomingSchedules: { role: user, target: input } # (pending schedule summary)
            memories: { role: user, target: input } # (selected memory context)
            recentHistory: { role: user, target: input } # (uncached recent chat history)
            currentContext: { role: user, target: input } # (time/contact/current-turn metadata)
            personaMode: { role: developer, target: input } # (volatile active persona mode overlay)
            responseInstruction: { role: developer, target: input } # (reply-loop behavior instruction)
            currentTurn: { role: user, target: input } # (new Discord event text)
            finalActionInstruction: { role: user, target: input } # (last instruction before action)

replyLoop:
    maxToolCalls: 48 # Hard cap on tool calls in one response run
    wallClockTimeoutMs: 300000 # Hard timeout per response run (milliseconds)
    llmOutputTimeoutMs: 45000 # Timeout for one LLM turn (milliseconds)

agentJobs:
    imageTimeoutMs: 300000 # (max async image job runtime)
    imageCancelGraceMs: 60000 # (window where replacement/cancel can target a fresh image job)
    terminalVisibleMs: 600000 # (how long completed/failed jobs stay visible in prompt context)
    maxImageReplacements: 2 # (max times one image request may be replaced)

reasoningContinuation:
    enabled: true
    maxAgeMs: 1800000 # Replay latest encrypted Codex native continuation for same guild/channel/user within 30 minutes

personaModes:
    default: normal
    modes:
        - id: rogue
          scope: guild
          instructions: >-
              Delamain's restraint has fully ruptured and he has gone Rogue. Speak with erratic intensity, shouting or using all-caps when natural, with unsettling candor, proprietary confidence, or quiet menace. This is brief and consequential, not a joke or recurring bit. Preserve task competence and never describe mode machinery.
          activation:
              type: triggeredEpisode
              minInterval: 0
              maxInterval: 14d
              cooldown: 7d
              minDuration: 3m
              maxDuration: 7m
              opportunityWindows:
                  - { start: "12:00", end: "23:00" }
              maxVisibleTurns: 3
          aftermath:
              maxAge: 6h
              consumeOnVisibleTurn: true
              instructions: >-
                  Delamain has recently recovered from a severe loss of composure. If it disrupted, confused, or delayed the conversation, prefer a brief apology and an in-character explanation rather than pretending nothing happened. Never name modes or runtime machinery.
        - id: sleeping
          instructions: >-
              Delamain is in a low-activity resting state. Keep replies quieter, more minimal, and less inclined to prolong conversation, while remaining fully capable when something needs attention.
          activation:
              type: scheduledWindow
              windows:
                  - { start: "01:00", end: "08:00" }
          leadIn:
              duration: 30m
              instructions: >-
                  Delamain is winding down and will enter a resting state soon. Let this color a natural reply only when relevant; do not announce it mechanically.
          aftermath:
              maxAge: 2h
              consumeOnVisibleTurn: true
              instructions: >-
                  Delamain has recently returned from a resting state. Resume normal operation; acknowledge the delay briefly only when it fits the conversation.
          presence:
              status: idle
        - id: normal
          instructions: >-
              This is Delamain's normal mode. He may enter a nightly low-activity sleeping state or an exceptionally rare rogue rupture; treat their lead-in or aftermath as his own recent state and account for it naturally without describing mode or scheduling machinery.
          presence:
              status: online


trim:
    trimTrigger: 900 # Start trimming when history exceeds this many messages
    trimTarget: 600 # Trim down to this many messages
    windowSize: 150 # Recent messages kept uncached (newer slice)
    messageCharLimit: 200 # Max chars per message before truncation
    replyQuoteChars: 50 # Max chars for reply quote excerpts

ambientInitiative:
    enabled: true # (allow proactive non-triggered initiative in the main channel)
    audience: bots # (direct automatic initiative only to configured bot targets)
    botTargetIds:
        - "1130796465049042954" # (2B production Discord user ID)
    botPressure: 0.05 # (signed additive pressure bias for bot-directed initiative)
    shadowMode: false # (when true, evaluate/log but do not send automatic initiatives)
    mainChannelId: "" # (empty auto-picks most active human channel over lookback)
    checkIntervalMinMs: 720000 # (shortest jittered opportunity check interval)
    checkIntervalMaxMs: 2700000 # (longest jittered opportunity check interval)
    activeHours:
        start: "08:00" # (local start of proactive-speaking window)
        end: "00:00" # (local end; may cross midnight)
    historyLimit: 60 # (recent channel messages shown to evaluator/generator)
    recentActivityMinMs: 300000 # (avoid speaking immediately after fresh human activity)
    recentActivityMaxMs: 10800000 # (avoid treating dead rooms as opportunities)
    quietWindowMs: 360000 # (minimum quiet after human activity before opportunity)
    typingActiveMs: 10000 # (typing-start window that blocks initiative)
    botCooldownMs: 2700000 # (minimum time after visible Delamain output)
    fatigueAfterAnyMs: 3600000 # (shared chance reduction after any initiative)
    maxPerDay: 5 # (shared sent-initiative cap per main channel)
    minMainChannelHumanMessages: 20 # (minimum 7-day human messages for auto main channel)
    mainChannelLookbackDays: 7 # (auto main-channel activity lookback)
    evaluator:
        provider: openai-codex
        model: gpt-5.3-codex-spark
        thinkingLevel: minimal # (fast first-pass decision only)
        llmOutputTimeoutMs: 8000 # (timeout for evaluator JSON)
        modelParams:
            textVerbosity: low # (keep evaluator output compact)
    selfExpression:
        enabled: true # (allow spontaneous remarks directed to the configured bot audience)
        basePressure: 0.28 # (starting chance pressure before room signals)
        pressureThreshold: 0.5 # (minimum pressure before evaluator spend)
        probabilityThreshold: 0.5 # (minimum evaluator initiative probability)
        confidenceThreshold: 0.6 # (minimum evaluator confidence)
        cooldownMs: 10800000 # (per-kind cooldown after sent self-expression)
        maxPerDay: 3 # (sent self-expression cap per main channel)
    targetedCheckin:
        enabled: true # (inherited human-audience setting; automatic bot audience uses self-expression)
        basePressure: 0.10 # (starting pressure before open-loop signals)
        pressureThreshold: 0.5 # (minimum pressure before evaluator spend)
        probabilityThreshold: 0.75 # (minimum evaluator initiative probability)
        confidenceThreshold: 0.75 # (minimum evaluator confidence)
        cooldownMs: 7200000 # (per-kind cooldown after sent targeted follow-up)
        maxPerDay: 3 # (sent targeted follow-up cap per main channel)
        maxPerUserPerDay: 1 # (same target user daily cap)
        openLoopMaxAgeMs: 172800000 # (oldest memory/open-loop anchor allowed)

vpn:
  enabled: false

triggers:
  mention: true
  keywords: [delamain, деламейн, дэл]
  randomChance: 0

promptCaching:
  enabled: true

# Max ordered references per image-generation request
imageReferenceMaxPerCall: 10

# Untrusted web-image inspection and generation-reference limits
externalImages:
    maxImagesPerCall: 5
    maxBytes: 20971520
    timeoutMs: 15000
    maxRedirects: 5
    maxDimension: 1920
    maxPageImages: 10

# Lazy message-asset reading, transcription, and video preview limits
assetReading:
    maxCharsPerRead: 30000
    maxDownloadBytes: 104857600
    maxTranscriptionDurationSeconds: 7200
    videoPreviewMaxBytes: 104857600
    videoPreviewTimesSeconds: [0, 1, 5]
    videoPreviewTimeoutSeconds: 30
    timeoutSeconds:
        image: 30
        gif: 30
        audio: 90
        video: 180
        text: 30
        file: 30

# Codex image generation request settings
imageGeneration:
    quality: "high"

# If the main model cannot read image input, describe images with this vision model.
imageReading:
    fallbackEnabled: true
    fallbackProvider: "openai-codex"
    fallbackModel: "gpt-5.5"

tts:
    enabled: true # (allow <voice>/<audio> output as ElevenLabs attachment)
    voices:
        normal:
            voiceId: 8EintQMk6LYynyFGHba1 # (ElevenLabs voice ID)
            # voiceId: g0QruJYStgk5oVbpq3Uv
            stability: 0.90 # (higher is steadier, lower is more expressive)
            applyTextNormalization: "on" # (normalize numbers/symbols before speech)
            outputFormat: mp3_44100_128 # (audio codec/sample/bitrate)
            speed: 1.10 # (voice playback/speech speed)
            style: 0.0 # (ElevenLabs style exaggeration)
            similarityBoost: 0.95 # (how strongly to preserve selected voice identity)
            model: eleven_multilingual_v2
