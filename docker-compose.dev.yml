services:
  bot:
    build:
      context: .
      target: deps-dev
    command: ["bun", "run", "dev"]
    env_file: .env
    environment:
      DATA_DIR: /app/data
      LOG_DIR: /tmp
      LOG_LEVEL: debug
      UNSAFELY_BYPASS_DASHBOARD_AUTH: "true"
    volumes:
      - ./src:/app/src
      - ./profiles:/app/profiles:ro
      - ./package.json:/app/package.json
      - ./tsconfig.json:/app/tsconfig.json
      - dev-data:/app/data
    ports:
      - "127.0.0.1:${DASHBOARD_PORT:-31457}:3000"
    stop_grace_period: 30m

volumes:
  dev-data:
