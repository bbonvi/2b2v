services:
  bot:
    build:
      context: .
      target: base
    command: ["bun", "--watch", "run", "src/index.ts"]
    env_file: .env
    environment:
      QDRANT_URL: http://qdrant:6333
      DATA_DIR: /app/data
      MODEL_CACHE_DIR: /app/model-cache
      LOG_LEVEL: debug
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - ./package.json:/app/package.json
      - ./tsconfig.json:/app/tsconfig.json
      - ./node_modules:/app/node_modules
      - dev-data:/app/data
      - dev-model-cache:/app/model-cache
    ports:
      - "3000:3000"
    depends_on:
      qdrant:
        condition: service_healthy

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - dev-qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  dev-data:
  dev-qdrant-data:
  dev-model-cache:
