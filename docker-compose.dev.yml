services:
  bot:
    build:
      context: .
      target: base
    command: ["bun", "--watch", "run", "src/index.ts"]
    env_file: .env
    environment:
      QDRANT_URL: http://qdrant:6333
      DATA_DIR: /app/data
      MODEL_CACHE_DIR: /app/model-cache
      SSH_KEYS_DIR: /app/ssh-keys
      LOG_LEVEL: debug
      UNSAFELY_BYPASS_DASHBOARD_AUTH: "true"
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - ./package.json:/app/package.json
      - ./tsconfig.json:/app/tsconfig.json
      - ./node_modules:/app/node_modules
      - dev-data:/app/data
      - dev-model-cache:/app/model-cache
      - dev-ssh-keys:/app/ssh-keys
    ports:
      - "31456:3000"
    networks:
      - default
      - bash-net
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /app/ssh-keys/authorized_keys"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 30s

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - dev-qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 3s
      retries: 5

  bash-vm:
    build:
      context: ./docker/bash-vm
    volumes:
      - dev-ssh-keys:/ssh-keys:ro
    networks:
      - bash-net
    cap_add:
      - NET_ADMIN
    depends_on:
      bot:
        condition: service_healthy

networks:
  bash-net:
    internal: true

volumes:
  dev-data:
  dev-qdrant-data:
  dev-model-cache:
  dev-ssh-keys:
